# Runs the whole-US-market PAM/Turtle scan once each weekday after the US close,
# then commits scan_results.json back into the repo so the analyzer can read it.
name: PAM market scan

on:
  schedule:
    - cron: '17 22 * * 1-5'   # 22:17 UTC, Mon-Fri (after US close). Off the top of the hour so GitHub is less likely to delay or skip it. 22:17 UTC = 6:17 AM Singapore, Tue-Sat.
  workflow_dispatch:           # also lets you run it on demand from the Actions tab

permissions:
  contents: write              # allow the job to commit the results file

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run the market scan
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}   # market cap + industry enrichment (matches pam_scan.js)
          PAM_HTML: pam_analyzer.html
          PAM_LIMIT: '0'         # 0 = the whole market
        run: node pam_scan.js

      - name: Publish scan_results.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scan_results.json
          git commit -m "market scan $(date -u +%Y-%m-%d) [skip ci]" || echo "nothing to commit"
          git push
