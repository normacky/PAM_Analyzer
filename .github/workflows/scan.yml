# Runs the whole-US-market PAM/Turtle scan once each weekday after the US close,
# then commits scan_results.json back into the repo so the analyzer can read it.
name: PAM market scan

on:
  schedule:
    - cron: '30 20 * * 1-5'   # 20:30 UTC. The run step waits until 16:25 New York before scanning, which self-adjusts for US daylight saving and never skips a run GitHub starts late.
  workflow_dispatch:           # also lets you run it on demand from the Actions tab

permissions:
  contents: write              # allow the job to commit the results file

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run the market scan
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}   # market cap + industry enrichment (matches pam_scan.js)
          PAM_HTML: pam_analyzer.html
          PAM_LIMIT: '0'         # 0 = the whole market
        run: |
          # The cron fires at 20:30 UTC. In US summer that is 16:30 New York (right after the 4 PM
          # close); in US winter it is 15:30 New York (market still open), so we WAIT until 16:25
          # New York before scanning. This self-adjusts for daylight saving and, unlike a fixed-time
          # check, NEVER skips a run that GitHub starts late. A manual "Run workflow" scans at once.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            while :; do
              ET=$(TZ=America/New_York date +%H%M)
              [ "$((10#$ET))" -ge 1625 ] && break
              echo "Market still open - waiting (now $(TZ=America/New_York date '+%H:%M') New York)..."
              sleep 120
            done
          fi
          echo "Running scan at $(TZ=America/New_York date '+%H:%M') New York"
          node pam_scan.js

      - name: Publish scan_results.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scan_results.json
          git commit -m "market scan $(date -u +%Y-%m-%d) [skip ci]" || echo "nothing to commit"
          git push
