# Runs the whole-US-market PAM/Turtle scan once each weekday after the US close,
# then commits scan_results.json back into the repo so the analyzer can read it.
name: PAM market scan

on:
  schedule:
    - cron: '30 20 * * 1-5'   # 20:30 UTC = 16:30 New York in US summer (EDT) -> runs. In winter this is 15:30 ET (market still open), so the gate below skips it.
    - cron: '30 21 * * 1-5'   # 21:30 UTC = 16:30 New York in US winter (EST) -> runs. In summer this is 17:30 ET, so the gate below skips it (it already ran at 20:30).
  workflow_dispatch:           # also lets you run it on demand from the Actions tab

permissions:
  contents: write              # allow the job to commit the results file

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run the market scan
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}   # market cap + industry enrichment (matches pam_scan.js)
          PAM_HTML: pam_analyzer.html
          PAM_LIMIT: '0'         # 0 = the whole market
        run: |
          # Auto-DST gate: the two cron times straddle the 4 PM ET close in both seasons.
          # Proceed only at 16:30 New York time, so exactly one slot fires each weekday all year.
          # A manual "Run workflow" is not a 'schedule' event, so it always runs.
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(TZ=America/New_York date +%H)" != "16" ]; then
            echo "Scheduled at $(TZ=America/New_York date '+%H:%M') ET - not the post-close slot this season; skipping."
            exit 0
          fi
          echo "Running scan at $(TZ=America/New_York date '+%H:%M') ET"
          node pam_scan.js

      - name: Publish scan_results.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scan_results.json
          git commit -m "market scan $(date -u +%Y-%m-%d) [skip ci]" || echo "nothing to commit"
          git push