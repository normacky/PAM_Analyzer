  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ackground:var(--panel);border:1px solid var(--line)}\n  .optcard .ohwarn{font-size:9.5px;color:var(--short);background:#231310;border:1px solid #532f27;padding:1px 6px;border-radius:4px;margin-left:4px}\n  .optcard .ohsub{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:3px}\n  .optcard .ohguide{font-size:12px;color:var(--mut);margin:7px 0 2px}\n  .optspread{border:1px solid var(--hair);border-radius:8px;background:var(--panel);padding:9px 11px;margin-top:8px}\n  .optspread.fav{border-color:var(--force);box-shadow:0 0 0 1px #53452233}\n  .optspread .osh{display:flex;align-items:center;gap:7px;flex-wrap:wrap}\n  .optspread .osname{font-family:var(--disp);font-weight:600;font-size:13px;color:var(--txt)}\n  .optspread .ostag{font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;padding:1px 6px;border-radius:4px;text-transform:uppercase}\n  .optspread .ostag.cr{color:var(--long);background:#0f211d;border:1px solid #1f4d44}\n  .optspread .ostag.db{color:var(--neutral);background:var(--panel-in);border:1px solid var(--line)}\n  .optspread .ostag.fav{color:var(--force);background:#231c10;border:1px solid #534522}\n  .optspread .oslegs{font-family:var(--mono);font-size:13px;color:var(--txt);margin-top:6px;font-weight:600}\n  .optspread .oseco{font-family:var(--mono);font-size:11px;color:var(--mut);margin-top:4px}\n  .optspread .osnone{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:5px;font-style:italic}\n  .optspread .osflags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}\n  .optcard .ohfoot{font-size:10.5px;color:var(--faint);margin-top:10px;line-height:1.5}\n  /* ===== quick-favourite star on the chart header ===== */\n  .wl-star{background:none;border:1px solid var(--line);border-radius:7px;color:var(--mut);width:26px;height:24px;cursor:pointer;font-size:13px;line-height:1;flex:none;padding:0;transition:.15s;align-self:center}\n  .wl-star:hover{color:var(--force);border-color:var(--force)}\n  .wl-star.on{color:var(--force);border-color:#534522;background:#231c10}\n  [data-theme=\"light\"] .wl-star.on{background:#f6efdd;border-color:#e0cfa0}\n  /* ===== collapsible scan sections ===== */\n  .scan-sec{border:1px solid var(--line);border-radius:9px;margin-top:10px;overflow:hidden;flex:none}\n  .scan-sec-hd{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;background:var(--panel-in);border:0;cursor:pointer;padding:9px 12px;color:var(--txt);text-align:left}\n  .scan-sec-hd:hover{background:var(--btnbg)}\n  .scan-sec-t{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut)}\n  .scan-sec-t .cr{display:inline-block;transition:transform .15s;font-size:9px;color:var(--faint)}\n  .scan-sec-hd.open .scan-sec-t{color:var(--txt)}\n  .scan-sec-hd.open .scan-sec-t .cr{transform:rotate(90deg)}\n  .scan-sec-sum{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--mut);min-width:0;overflow:hidden;white-space:nowrap}\n  .scan-sec-body{padding:12px}\n  /* ===== options detail drawer — side panel on desktop, bottom sheet on mobile ===== */\n  #optDrawer{position:absolute;inset:0;z-index:60;visibility:hidden;opacity:0;transition:opacity .18s ease}\n  #optDrawer.open{visibility:visible;opacity:1}\n  .optdw-scrim{position:absolute;inset:0;background:rgba(5,8,12,.42)}\n  [data-theme=\"light\"] .optdw-scrim{background:rgba(60,52,40,.24)}\n  .optdw-panel{position:absolute;top:0;right:0;bottom:0;width:340px;max-width:94%;background:var(--panel-in);border-left:1px solid var(--line);box-shadow:-18px 0 44px rgba(0,0,0,.42);display:flex;flex-direction:column;transform:translateX(102%);transition:transform .24s cubic-bezier(.4,0,.2,1)}\n  #optDrawer.open .optdw-panel{transform:none}\n  .optdw-grip{display:none}\n  .optdw-head{display:flex;align-items:center;gap:9px;padding:13px 14px 11px;border-bottom:1px solid var(--line)}\n  .optdw-tk{font-family:var(--mono);font-size:15px;font-weight:600}\n  .optdw-nm{font-family:var(--body);font-size:11px;color:var(--mut);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}\n  .optdw-x{margin-left:auto;background:none;border:1px solid var(--line);border-radius:7px;color:var(--mut);width:28px;height:26px;cursor:pointer;flex:none;font-size:12px}\n  .optdw-x:hover{color:var(--txt);border-color:var(--mut)}\n  .optdw-body{overflow-y:auto;overflow-x:hidden;padding:12px 13px 20px;scrollbar-width:thin;scrollbar-color:var(--line) transparent}\n  .optdw-body .optcard{margin:0}\n  @media(max-width:980px){\n    #optDrawer{position:fixed;z-index:300}\n    .optdw-panel{top:auto;left:0;right:0;bottom:0;width:auto;max-width:none;max-height:84vh;border-left:0;border-top:1px solid var(--line);border-radius:18px 18px 0 0;box-shadow:0 -18px 44px rgba(0,0,0,.5);transform:translateY(102%)}\n    .optdw-grip{display:block;width:38px;height:4px;border-radius:99px;background:var(--line);margin:8px auto 2px}\n  }\n  /* ===== chat tab (Supabase) — WhatsApp-style ===== */\n  .chatBadge{display:none;margin-left:6px;background:var(--long);color:#0b0f1a;border-radius:9px;font-size:10px;font-weight:700;padding:1px 6px;font-family:var(--mono);vertical-align:1px}\n  .alertsbtn{padding:5px 10px;font-size:11px}\n  .alertsbtn.on{color:var(--long);border-color:#1f4d44;background:#0f211d}\n  [data-theme=\"light\"] .alertsbtn.on{color:#2f8268;border-color:#bcdccf;background:#eaf3ee}\n  .tabpanel[data-tab=\"chat\"].on > .card{display:flex;flex-direction:column;overflow:hidden}\n  #chatFeed{flex:1 1 auto;min-height:180px;max-height:58vh;overflow-y:auto;margin-top:10px;padding:0 2px;scrollbar-width:thin;scrollbar-color:var(--line) transparent}\n  .dayChip{text-align:center;margin:12px 0 6px}\n  .dayChip span{background:var(--panel-in);border:1px solid var(--hair);border-radius:12px;padding:3px 11px;font-family:var(--mono);font-size:10.5px;color:var(--mut)}\n  .msgRow{display:flex;margin:2px 0;padding:1px 0}\n  .msgRow.me{justify-content:flex-end}\n  .bub{max-width:min(78%,520px);background:var(--panel-in);border:1px solid var(--hair);border-radius:12px;padding:6px 9px 5px;cursor:pointer}\n  .msgRow.me .bub{background:rgba(95,184,158,.13);border-color:rgba(95,184,158,.32);border-top-right-radius:4px}\n  .msgRow:not(.me) .bub{border-top-left-radius:4px}\n  .bub .who{display:block;font-family:var(--mono);font-size:11px;font-weight:700;margin-bottom:1px}\n  .bub .body{font-family:var(--body);font-size:13px;color:var(--txt);white-space:pre-wrap;word-break:break-word;line-height:1.42}\n  .bub .when{float:right;font-family:var(--mono);font-size:9.5px;color:var(--faint);margin:8px 0 0 10px}\n  .bub img{max-width:min(320px,100%);max-height:260px;border:1px solid var(--line);border-radius:8px;margin-top:4px;cursor:zoom-in;display:block}\n  .quote{border-left:3px solid var(--long);background:rgba(127,127,127,.09);border-radius:6px;padding:4px 8px;margin:0 0 5px;font-size:11.5px;color:var(--mut);cursor:pointer;overflow:hidden}\n  .quote .qwho{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--long)}\n  .quote .qtxt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:340px}\n  .reacts{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}\n  .reactPill{border:1px solid var(--line);background:var(--panel);border-radius:10px;padding:0 7px;font-size:11.5px;line-height:19px;cursor:pointer;font-family:var(--mono);color:var(--txt)}\n  .reactPill.mine{border-color:var(--long)}\n  .actrow{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;padding-top:6px;border-top:1px dashed var(--hair)}\n  .actrow button{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:2px 7px;font-size:14px;cursor:pointer;color:var(--txt)}\n  .actrow .rep{font-family:var(--mono);font-size:11px}\n  .flashMsg .bub{outline:2px solid var(--long)}\n  #chatReplyBox{display:none;align-items:center;gap:8px;margin-top:8px;border-left:3px solid var(--long);background:var(--panel-in);border-radius:8px;padding:6px 9px}\n  #chatReplyTxt{font-size:11.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n  #chatReplyWho{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--long)}\n  #emoPal{display:none;flex-wrap:wrap;gap:2px;margin-top:8px;border:1px solid var(--line);border-radius:10px;padding:7px;background:var(--panel-in);max-height:120px;overflow-y:auto}\n  #emoPal button{background:none;border:none;font-size:19px;cursor:pointer;padding:2px 4px;border-radius:6px}\n  #emoPal button:hover{background:var(--panel)}\n  #chatBar{flex:none;display:flex;gap:8px;align-items:flex-end;margin-top:10px}\n  #chatText{flex:1;min-height:38px;max-height:120px;resize:vertical;font-family:var(--body);font-size:13px;background:var(--panel-in);color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:8px 10px;outline:none}\n  #chatPreview{flex:none;display:none;align-items:center;gap:6px;margin-top:8px}\n  #chatPreview img{max-height:56px;border:1px solid var(--line);border-radius:6px}\n<\u002Fstyle>\n\n<\u002Fhead><body><div class=\"wrap\">\n  <header>\n    <div class=\"brand\">\n      <div class=\"ey\">Price Action Manipulation · the operator's lens<\u002Fdiv>\n      <h1>PAM Analyzer<\u002Fh1>\n      <div class=\"sub\">Reads a chart the way the framework does, then marks only the <b>genuine triggers<\u002Fb> —\n        each labelled with which of the setups fired and why. Type a symbol to pull its data, or paste any chart in ⚙ Settings.<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fheader>\n\n    <div class=\"controls\" id=\"mainBar\">\n    <span class=\"ctl-label\">Symbol<\u002Fspan>\n    <input id=\"tkInput\" type=\"text\" placeholder=\"e.g. NVDA\" autocomplete=\"off\" spellcheck=\"false\" style=\"font-family:var(--mono);font-size:13px;background:var(--panel-in);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 11px;width:96px;text-transform:uppercase;outline:none\">\n    <button class=\"btn\" id=\"fetchBtn\">Fetch<\u002Fbutton>\n\n    <span class=\"ctl-label\" style=\"margin-left:10px\">Timeframe<\u002Fspan>\n    <div class=\"seg\" id=\"segTf\">\n      <button data-tf=\"W\">W · 3y<\u002Fbutton>\n      <button data-tf=\"2\" class=\"on\">2D · 1y<\u002Fbutton>\n      <button data-tf=\"1\">D<\u002Fbutton>\n    <\u002Fdiv>\n\n    <span class=\"ctl-label\" style=\"margin-left:10px\">Lens<\u002Fspan>\n    <div class=\"seg\" id=\"segLens\"><button data-l=\"1\" class=\"on\">On<\u002Fbutton><button data-l=\"0\">Off<\u002Fbutton><\u002Fdiv>\n\n    <span class=\"spacer\" style=\"flex:1\"><\u002Fspan>\n\n    <button class=\"btn drawer-btn\" id=\"indToggle\">Indicators <span id=\"indState\" style=\"color:var(--faint)\">off<\u002Fspan> ▾<\u002Fbutton>\n    <button class=\"btn drawer-btn\" id=\"settingsToggle\">⚙ Settings<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div class=\"controls\" id=\"statusBar\" style=\"margin-top:-8px\">\n    <span id=\"fetchStatus\" style=\"font-family:var(--mono);font-size:11.5px;color:var(--mut)\">Showing NVDA sample · open ⚙ Settings to add your free key and fetch any symbol<\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"drawer\" id=\"indPanel\" style=\"display:none\">\n    <div class=\"drawer-h\" style=\"margin-bottom:10px\">Indicator sub-panels — toggle on to draw beneath the chart<\u002Fdiv>\n    <div class=\"layers\" id=\"indicators\">\n      <button data-in=\"stoch\">Stochastic<\u002Fbutton>\n      <button data-in=\"rsi\">RSI<\u002Fbutton>\n      <button data-in=\"macd\">MACD<\u002Fbutton>\n      <button data-in=\"atr\">ATR<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"drawer\" id=\"settingsPanel\" style=\"display:none\">\n    <div class=\"drawer-grid\">\n      <div class=\"drawer-group\">\n        <div class=\"drawer-h\">Appearance<\u002Fdiv>\n        <div class=\"drawer-row\">\n          <span class=\"ctl-label\">Theme<\u002Fspan>\n          <button class=\"btn drawer-btn\" id=\"themeToggle\">◐ Light<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"drawer-group\">\n        <div class=\"drawer-h\">Data &amp; API<\u002Fdiv>\n        <div class=\"drawer-row\">\n          <span class=\"ctl-label\">Key<\u002Fspan>\n          <input id=\"keyInput\" type=\"password\" placeholder=\"Twelve Data key (optional in a group)\" autocomplete=\"off\" spellcheck=\"false\" style=\"font-family:var(--mono);font-size:12.5px;background:var(--panel-in);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 10px;flex:1;min-width:150px;outline:none\">\n          <a href=\"https://twelvedata.com/pricing\" target=\"_blank\" rel=\"noopener\" style=\"font-family:var(--mono);font-size:11px;color:var(--long);text-decoration:none\">free key ↗<\u002Fa>\n        <\u002Fdiv>\n        <div class=\"drawer-row\">\n          <span class=\"ctl-label\">Source<\u002Fspan>\n          <div class=\"seg\" id=\"segData\"><button data-d=\"NVDA\" class=\"on\">Live data<\u002Fbutton><button data-d=\"PASTE\">Paste…<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"drawer-group\">\n        <div class=\"drawer-h\">Watchlist<\u002Fdiv>\n        <div class=\"drawer-row\">\n          <div class=\"layers\" id=\"wlChips\" style=\"flex:1\"><\u002Fdiv>\n          <button class=\"btn\" id=\"wlAdd\" style=\"padding:5px 10px;font-size:11px\">★ Add<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"drawer-group\">\n        <div class=\"drawer-h\">Account · Sync + Chat<\u002Fdiv>\n        <div class=\"drawer-row\">\n          <span id=\"syncStatus\" style=\"font-family:var(--mono);font-size:11px;color:var(--mut)\">Not signed in<\u002Fspan>\n          <button class=\"btn\" id=\"sbSignOut\" style=\"display:none;padding:5px 10px;font-size:11px\">Sign out<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"font-family:var(--mono);font-size:10.5px;color:var(--faint);line-height:1.5\">\n          One account does everything: sign in once (from the <b>Chat<\u002Fb> tab) and your watchlist, settings, check log and Twelve Data key sync to every device — plus you join the group chat. No password: a login link is emailed to you.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"drawer-group\">\n        <div class=\"drawer-h\">Group activity<\u002Fdiv>\n        <div class=\"drawer-row\">\n          <button class=\"btn\" id=\"grpToggle\" style=\"padding:5px 10px;font-size:11px\">Members ▾<\u002Fbutton>\n          <span id=\"groupStatus\" style=\"font-family:var(--mono);font-size:11px;color:var(--mut)\">Not in a group<\u002Fspan>\n        <\u002Fdiv>\n        <div id=\"groupPanel\" style=\"display:none;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:2px\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;align-items:center\">\n            <input id=\"grpToken\" type=\"password\" placeholder=\"Your group access token (sent to you by the owner)\" autocomplete=\"off\" spellcheck=\"false\" style=\"font-family:var(--mono);font-size:12px;background:var(--panel-in);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 10px;flex:1;min-width:220px;outline:none\">\n            <button class=\"btn\" id=\"grpJoin\">Join<\u002Fbutton>\n            <button class=\"btn\" id=\"grpRefresh\">Refresh<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"font-family:var(--mono);font-size:10.5px;color:var(--faint);line-height:1.5;padding-top:7px\">\n            The owner adds you, then sends you a private token — paste it once and you are in. Your token stays in this browser only. Your Twelve Data key is never shared with the group: only the ticker you check, your name and the time are posted to the shared activity feed below.\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"controls\" id=\"layersBar\">\n    <span class=\"ctl-label\">Layers<\u002Fspan>\n    <div class=\"layers\" id=\"layers\">\n      <button data-ly=\"pam\" class=\"on\">PAM triggers<\u002Fbutton>\n      <button data-ly=\"sma\" class=\"on\">SMA 20/50/200<\u002Fbutton>\n      <button data-ly=\"channels\">Donchian 55/20/10<\u002Fbutton>\n      <button data-ly=\"turtle\">Turtle S1/S2<\u002Fbutton>\n      <button data-ly=\"reverse\">Reverse S1s/S2s<\u002Fbutton>\n    <\u002Fdiv>\n    <span class=\"ctl-label\" style=\"margin-left:8px\">Declutter<\u002Fspan>\n    <div class=\"seg\" id=\"segRecent\"><button data-r=\"0\" class=\"on\">All<\u002Fbutton><button data-r=\"1\">Recent<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"paste\" id=\"pasteBox\">\n    <textarea id=\"pasteTa\" placeholder=\"Paste OHLC rows, one bar per line. Accepts: date,open,high,low,close (or open,high,low,close). Commas, tabs or spaces all work.\"><\u002Ftextarea>\n    <div class=\"row\">\n      <button class=\"btn\" id=\"pasteRun\">Analyse pasted data<\u002Fbutton>\n      <button class=\"btn\" id=\"pasteSample\">Insert a sample<\u002Fbutton>\n      <span class=\"err\" id=\"pasteErr\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"stage\">\n  <div class=\"stage-chart\">\n    <div class=\"verdict pinned-verdict\">\n      <div class=\"tk\" id=\"vTk\">—<\u002Fdiv>\n      <div class=\"nm\" id=\"vNm\"><\u002Fdiv>\n      <button class=\"wl-star\" id=\"chartWlBtn\" type=\"button\" title=\"Add to watchlist\">☆<\u002Fbutton>\n      <div class=\"px\" id=\"vPx\">—<\u002Fdiv>\n      <div class=\"chips\" id=\"vChips\"><\u002Fdiv>\n      <button class=\"optbadge\" id=\"chartOptBtn\" type=\"button\" style=\"display:none\">options ▾<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"chartOptCard\" style=\"display:none\"><\u002Fdiv>\n    <button class=\"chart-collapse-btn\" id=\"chartCollapse\" type=\"button\">▾ Hide chart<\u002Fbutton>\n  <div class=\"chartcard\">\n    <canvas id=\"chart\"><\u002Fcanvas>\n    <canvas id=\"chartOverlay\"><\u002Fcanvas>\n    <div class=\"tip\" id=\"tip\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:8px;padding:6px 12px 2px\">\n      <button class=\"btn\" id=\"fitAll\" style=\"padding:5px 9px;font-size:11px\">Fit all<\u002Fbutton>\n      <button class=\"btn\" id=\"zOut\" style=\"padding:5px 11px;font-size:13px\" title=\"Zoom out\">–<\u002Fbutton>\n      <button class=\"btn\" id=\"zIn\" style=\"padding:5px 11px;font-size:13px\" title=\"Zoom in\">+<\u002Fbutton>\n      <input type=\"range\" id=\"scroll\" min=\"0\" max=\"100\" value=\"100\" style=\"flex:1;accent-color:#5fb89e;cursor:pointer\">\n      <span id=\"rangeLbl\" style=\"font-family:var(--mono);font-size:11px;color:var(--mut);min-width:188px;text-align:right\"><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"legend\">\n      <span><b style=\"border-color:var(--force)\"><\u002Fb>50 SMA (PAM flow)<\u002Fspan>\n      <span><b style=\"border-color:var(--neutral)\"><\u002Fb>20 SMA<\u002Fspan>\n      <span><b style=\"border-color:#b07fd0\"><\u002Fb>200 SMA<\u002Fspan>\n      <span style=\"color:var(--long)\">▲<\u002Fspan><span style=\"color:var(--short)\">▼ PAM trigger<\u002Fspan>\n      <span style=\"color:#378add\">Donchian 20<\u002Fspan><span style=\"color:#9a7fe0\">55<\u002Fspan><span style=\"color:#d4a85c\">10 (exit)<\u002Fspan>\n      <span style=\"color:#3f9af0\">S1/S2 long<\u002Fspan><span style=\"color:#ff6f45\">S1s/S2s reverse<\u002Fspan>\n      <span style=\"color:#5b667e\">drag · scroll · Shift-scroll zooms · swipe panels ‹ ›<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tabbar\" id=\"tabbar\">\n    <button class=\"tabbtn on\" data-tab=\"scan\">Scan<\u002Fbutton>\n    <button class=\"tabbtn\" data-tab=\"eff\">Effectiveness<\u002Fbutton>\n    <button class=\"tabbtn\" data-tab=\"read\">Read<\u002Fbutton>\n    <button class=\"tabbtn\" data-tab=\"trade\">Trade<\u002Fbutton>\n    <button class=\"tabbtn\" data-tab=\"log\">Check log<\u002Fbutton>\n    <button class=\"tabbtn\" data-tab=\"group\">Group<\u002Fbutton>\n    <button class=\"tabbtn\" data-tab=\"chat\">Chat<span class=\"chatBadge\"><\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n  <\u002Fdiv><!-- /stage-chart -->\n  <div class=\"stage-panels\">\n  <div class=\"tabbar tabbar-top\" id=\"tabbarTop\">\n    <button class=\"tabbtn on\" data-tab=\"scan\">Scan<\u002Fbutton>\n    <button class=\"tabbtn\" data-tab=\"eff\">Effectiveness<\u002Fbutton>\n    <button class=\"tabbtn\" data-tab=\"read\">Read<\u002Fbutton>\n    <button class=\"tabbtn\" data-tab=\"trade\">Trade<\u002Fbutton>\n    <button class=\"tabbtn\" data-tab=\"log\">Check log<\u002Fbutton>\n    <button class=\"tabbtn\" data-tab=\"group\">Group<\u002Fbutton>\n    <button class=\"tabbtn\" data-tab=\"chat\">Chat<span class=\"chatBadge\"><\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"tabpanel on\" data-tab=\"scan\">\n  <div class=\"card\" id=\"scanCard\" style=\"margin-top:18px\">\n    <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:12px\">\n      <div style=\"min-width:0\">\n        <h2 style=\"margin:0\">Scan by trigger <span id=\"scanAsof\" style=\"color:var(--faint);font-weight:400;text-transform:none;letter-spacing:0\"><\u002Fspan><\u002Fh2>\n        <div class=\"lead\" id=\"scanLead\" style=\"margin-top:2px\">pick a trigger — every US counter that fired it on the last 2 daily bars · tap one to chart it<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"scan-sec\">\n      <button class=\"scan-sec-hd open\" id=\"trigHd\" type=\"button\">\n        <span class=\"scan-sec-t\"><span class=\"cr\">▸<\u002Fspan> Trigger<\u002Fspan>\n        <span class=\"scan-sec-sum\" id=\"trigSum\"><\u002Fspan>\n      <\u002Fbutton>\n      <div class=\"scan-sec-body\" id=\"trigBody\">\n        <div id=\"scanChips\" style=\"display:flex;gap:6px;flex-wrap:wrap\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"scan-sec\">\n      <button class=\"scan-sec-hd\" id=\"filtHd\" type=\"button\">\n        <span class=\"scan-sec-t\"><span class=\"cr\">▸<\u002Fspan> Filters<\u002Fspan>\n        <span class=\"scan-sec-sum\" id=\"filtSum\"><\u002Fspan>\n      <\u002Fbutton>\n      <div class=\"scan-sec-body\" id=\"filtBody\" style=\"display:none\">\n    <div id=\"scanFilters\" style=\"display:none;flex-wrap:wrap;gap:12px 18px;align-items:center\">\n      <span id=\"fCapWrap\" style=\"display:inline-flex;align-items:center;gap:5px\">\n        <span class=\"ctl-label\">Cap&nbsp;$B<\u002Fspan>\n        <input id=\"fCapMin\" class=\"scannum\" type=\"number\" min=\"0\" step=\"0.1\" placeholder=\"min\">\n        <span style=\"color:var(--faint)\">–<\u002Fspan>\n        <input id=\"fCapMax\" class=\"scannum\" type=\"number\" min=\"0\" step=\"0.1\" placeholder=\"max\">\n      <\u002Fspan>\n      <span id=\"fPxWrap\" style=\"display:inline-flex;align-items:center;gap:8px\">\n        <span class=\"ctl-label\">Price&nbsp;$<\u002Fspan>\n        <span id=\"pxSlider\" class=\"drng\">\n          <span class=\"drng-track\"><\u002Fspan>\n          <span class=\"drng-fill\" id=\"pxFill\"><\u002Fspan>\n          <span class=\"drng-h\" id=\"pxLo\" tabindex=\"0\" title=\"min price\"><\u002Fspan>\n          <span class=\"drng-h\" id=\"pxHi\" tabindex=\"0\" title=\"max price\"><\u002Fspan>\n        <\u002Fspan>\n        <span id=\"pxLabel\" style=\"font-family:var(--mono);font-size:11px;color:var(--mut);min-width:104px\">$0 – $0<\u002Fspan>\n      <\u002Fspan>\n      <span id=\"fIndWrap\" style=\"display:inline-flex;align-items:center;gap:5px\">\n        <span class=\"ctl-label\">Industry<\u002Fspan>\n        <select id=\"fInd\" class=\"scansel\"><option value=\"\">All industries<\u002Foption><\u002Fselect>\n      <\u002Fspan>\n      <button class=\"btn\" id=\"fClear\" style=\"padding:4px 10px;font-size:11px\">Clear<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"scanUnits\" style=\"display:none;margin-top:10px;align-items:center;gap:6px;flex-wrap:wrap\">\n      <span class=\"ctl-label\">Unit<\u002Fspan>\n      <button class=\"unitbtn\" data-unit=\"1\">1st<\u002Fbutton>\n      <button class=\"unitbtn\" data-unit=\"2\">2nd<\u002Fbutton>\n      <button class=\"unitbtn\" data-unit=\"3\">3rd<\u002Fbutton>\n      <button class=\"unitbtn\" data-unit=\"4\">4th<\u002Fbutton>\n    <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--hair)\">\n          <span class=\"ctl-label\">Data<\u002Fspan>\n          <input id=\"scanUrl\" type=\"text\" placeholder=\"scan_results.json URL\" autocomplete=\"off\" spellcheck=\"false\" style=\"font-family:var(--mono);font-size:11px;background:var(--ink2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:6px 9px;flex:1;min-width:150px\">\n          <button class=\"btn\" id=\"scanLoad\" style=\"padding:5px 11px;font-size:11px\">Load<\u002Fbutton>\n          <button class=\"btn\" id=\"scanFileBtn\" style=\"padding:5px 11px;font-size:11px\">Load file…<\u002Fbutton>\n          <input id=\"scanFile\" type=\"file\" accept=\"application/json,.json\" style=\"display:none\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"scanBody\" style=\"margin-top:12px\"><\u002Fdiv>\n    <div class=\"caveat\" id=\"scanNote\"><\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv><!-- /scan panel -->\n  <div class=\"tabpanel\" data-tab=\"eff\">\n  <div class=\"card\" id=\"effCard\" style=\"margin-top:18px\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap\">\n      <div>\n        <h2 style=\"margin:0\">Trigger effectiveness <span id=\"effName\" style=\"color:var(--faint);font-weight:400;text-transform:none;letter-spacing:0\"><\u002Fspan><\u002Fh2>\n        <div class=\"lead\" style=\"margin-top:2px\">how each system's signals actually played out — scored on daily bars · <span style=\"color:var(--force)\">click any row to expand its setups<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;min-width:248px\">\n        <button class=\"btn\" id=\"effExpand\" style=\"padding:5px 11px;font-size:11px;margin-right:4px\">Expand all<\u002Fbutton>\n        <span class=\"ctl-label\">Window<\u002Fspan>\n        <input type=\"range\" id=\"effYears\" min=\"0\" max=\"6\" step=\"1\" value=\"4\" style=\"flex:1;accent-color:#5fb89e;cursor:pointer\">\n        <span id=\"effYearsLbl\" style=\"font-family:var(--mono);font-size:12px;color:var(--txt);min-width:64px;text-align:right\">3 years<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"effBody\" style=\"margin-top:14px\"><\u002Fdiv>\n    <div class=\"caveat\" id=\"effNote\"><\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv><!-- /eff panel -->\n  <div class=\"tabpanel\" data-tab=\"read\">\n    <div class=\"card\">\n      <h2>The read<\u002Fh2>\n      <div class=\"lead\">worked through in the framework's order — latest bar on the right edge<\u002Fdiv>\n      <div id=\"steps\"><\u002Fdiv>\n      <div class=\"caveat\" id=\"caveat\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv><!-- /read panel -->\n  <div class=\"tabpanel\" data-tab=\"trade\">\n    <div class=\"card\">\n      <h2>Trade structure<\u002Fh2>\n      <div class=\"lead\">drawn only when the latest bar is itself a trigger<\u002Fdiv>\n      <div class=\"trade\" id=\"trade\"><\u002Fdiv>\n\n      <h2 style=\"margin-top:24px\">Recent triggers — and why<\u002Fh2>\n      <div class=\"lead\">every marked signal on the chart, newest first<\u002Fdiv>\n      <div class=\"log\" id=\"log\"><\u002Fdiv>\n\n      <details>\n        <summary>What the labels mean<\u002Fsummary>\n        <div class=\"glo\">\n          <div><b>UC1 / UC2<\u002Fb> — Up Continuation (long, Lesson 16/17). Up flow above the 50sma; a <i>minority<\u002Fi> pullback (no majority flush) forces an LP; bullish EXE closes back at/above it within 5 bars. Deck gates enforced: no flush-<i>up<\u002Fi> bar in the 3 bars into the pullback's origin, structure near/testing the 20/50 SMA, EXE still below the pullback's interior high. \"2\" = the deeper two-leg (A-B-C-D) variant.<\u002Fdiv>\n          <div><b>DC1 / DC2<\u002Fb> — Down Continuation (short). Exact mirror: down flow, minority bounce into an LP, no flush-down into the origin, near/testing 20/50 SMA, bearish EXE rejects it within 5 bars while still above the interior low.<\u002Fdiv>\n          <div><b>UR1 / UR2<\u002Fb> — Reversal shorts (Lesson 9/19). <b>UR1<\u002Fb> is the general case: a force top at a live LP swing-high with a bearish EXE closing back at/below it within 5 bars, in <i>either<\u002Fi> flow. <b>UR2<\u002Fb> is the refined <i>subset<\u002Fi>: up flow, plus a <i>majority flush-up MOVE<\u002Fi> into the LP — steep (≥1.5×ATR per bar) and starting at/beyond the 50% line of X (the LP) to Y (the lowest point right of X) — plus a retracement bigger than the prior one. A UR2 is the one the deck says usually marks a real trend change.<\u002Fdiv>\n          <div><b>DR1 / DR2<\u002Fb> — Reversal longs. Exact mirror: <b>DR1<\u002Fb> = force bottom at a live LP swing-low, bullish EXE recovers it within 5 bars, either flow. <b>DR2<\u002Fb> = the subset: down flow + a majority flush-<i>down<\u002Fi> move into the LP (leg from at/beyond the 50% X–Y line) + a bigger retracement than the prior one. A slow grind into the LP is a wave, not a flush — that is still a DR1, just not a DR2.<\u002Fdiv>\n          <div><b>Bull-FS / Bear-FS<\u002Fb> — Force Strike (course Lesson 8). Mother/baby inside-bar pair is <i>mandatory and consecutive<\u002Fi>: a mother bar, then the single baby bar immediately after it inside the mother's range. Then a single <i>Force Strike bar<\u002Fi> — a same-direction EXE (PIN / Ice Cream / Mark Up-Down) — pierces the mother's extreme intrabar and closes back inside on that same bar, occurring within 3 bars of the baby. Any flow, above or below the 50sma. If the pierce also dipped through a live LP and the EXE closed back at/on the correct side of it, that's the <i>force bottom/top scenario<\u002Fi> — the standalone-tradeable case; without an LP it's a formation flag only. There is no FS without the inside pair.<\u002Fdiv>\n          <div><b>Force top / bottom<\u002Fb> — price pierces an un-breached swing high/low (LP) then closes back on the correct side of it: a failed break = a trap. LPs come from the full loaded history; the pierce may be any of the last 5 bars. A swing level needs <b>3 higher/lower bars to its LEFT and 1 to its right<\u002Fb> (v0.19: left precedence, plus one bar of confirmation) and dies once any bar <i>closes<\u002Fi> through it.<\u002Fdiv>\n          <div><b>EXE bar<\u002Fb> — the candle traded off: PIN, Ice Cream or Mark up/down. Flush bars are exits, not entries.<\u002Fdiv>\n          <div><b>1 vs 2<\u002Fb> — the \"2\" is always the narrower case: for continuations a deeper two-leg pullback, for reversals a majority flush + bigger retracement. Every \"2\" is also a \"1\". Geometry is approximated, not slide-exact — eyeball the structure to confirm.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv><!-- /trade panel -->\n  <div class=\"tabpanel\" data-tab=\"log\">\n  <div class=\"card\" id=\"checklogCard\" style=\"margin-top:14px\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap\">\n      <div>\n        <h2 style=\"margin:0\">Check log<\u002Fh2>\n        <div class=\"lead\" style=\"margin-top:2px\">every counter you've checked, newest first — synced across your devices<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:8px\">\n        <button class=\"btn\" id=\"clogCsv\" style=\"padding:5px 10px;font-size:11px\">Export CSV<\u002Fbutton>\n        <button class=\"btn\" id=\"clogClear\" style=\"padding:5px 10px;font-size:11px\">Clear<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"log\" id=\"checklog\" style=\"margin-top:10px;max-height:260px;overflow:auto\"><\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv><!-- /log panel -->\n  <div class=\"tabpanel\" data-tab=\"group\">\n  <div class=\"card\" id=\"groupCard\" style=\"margin-top:14px\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap\">\n      <div>\n        <h2 style=\"margin:0\">Group activity<\u002Fh2>\n        <div class=\"lead\" style=\"margin-top:2px\">what everyone in the group is checking, newest first — shared, visible to all members<\u002Fdiv>\n        <div id=\"groupPresence\" style=\"margin-top:5px\"><\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"btn\" id=\"grpRefresh2\" style=\"padding:5px 10px;font-size:11px\">Refresh<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"log\" id=\"groupFeed\" style=\"margin-top:10px;max-height:300px;overflow:auto\"><\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv><!-- /group panel -->\n  <div class=\"tabpanel\" data-tab=\"chat\">\n  <div class=\"card\" id=\"chatCard\" style=\"margin-top:14px\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;flex:none\">\n      <div>\n        <h2 style=\"margin:0\">Group chat<\u002Fh2>\n        <div class=\"lead\" style=\"margin-top:2px\">persistent, members-only — paste text or screenshots of trade ideas, everyone sees the full history<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\">\n        <button class=\"btn alertsbtn\" id=\"chatAlertsBtn\" type=\"button\" title=\"Get a sound + notification when someone posts (while this tab is open)\">🔔 Alerts off<\u002Fbutton>\n        <span id=\"chatStatus\" style=\"font-family:var(--mono);font-size:11px;color:var(--mut)\"><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"chatAuthBox\" style=\"flex:none;border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:12px\">\n      <div style=\"display:flex;flex-wrap:wrap;gap:8px;align-items:center\">\n        <input id=\"chatEmail\" type=\"email
