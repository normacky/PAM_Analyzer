  fl.appendChild(optPill('liquid',sp.ok?sp.ok.liquidity:null));\n  fl.appendChild(optPill('credit \\u2265$0.90/side',sp.ok?sp.ok.credit_each:null));\n  card.appendChild(fl);\n  return card;\n}\nfunction optDetailCard(t,dir){\n  const o=scanOptFor(t);\n  const wrap=document.createElement('div'); wrap.className='optcard';\n  const long=(dir==='long');\n  const oh=document.createElement('div'); oh.className='oh';\n  const ivPct=o.atm_iv!=null?Math.round(o.atm_iv*100):null;\n  const ivTag=o.flags.iv_high?'HIGH':o.flags.iv_low?'LOW':'MID';\n  const multi=(o.expiries&&o.expiries.length>1);\n  oh.innerHTML='<span class=\"ohk\">OPTIONS<\u002Fspan> '+(multi?(o.expiries.length+' expiries scanned \\u00b7 '+optWinTxt(o)):('exp '+o.expiry+' \\u00b7 '+o.dte+' DTE'))+' \\u00b7 ATM IV '+(ivPct!=null?ivPct+'%':'n/a')\n    +(ivPct!=null?' <span class=\"ohiv '+ivTag.toLowerCase()+'\">'+ivTag+'<\u002Fspan>':'')\n    +(o.dte_off_window?' <span class=\"ohwarn\">DTE off-window<\u002Fspan>':'');\n  wrap.appendChild(oh);\n  const pl=document.createElement('div'); pl.className='ohsub';\n  const _blk=scanOptBlock()||{};\n  const _hi=(_blk.iv_high_threshold!=null)?Math.round(_blk.iv_high_threshold*100):35;\n  const _lo=(_blk.iv_low_threshold!=null)?Math.round(_blk.iv_low_threshold*100):30;\n  pl.textContent='IV measure: absolute ATM IV \\u2014 HIGH above '+_hi+'%, LOW below '+_lo+'%';\n  wrap.appendChild(pl);\n  const g=document.createElement('div'); g.className='ohguide';\n  const favTxt = o.flags.iv_high ? (long?'Bull Put (credit)':'Bear Call (credit)')\n               : o.flags.iv_low ? (long?'Bull Call (debit)':'Bear Put (debit)') : null;\n  g.textContent = favTxt ? ('Ruleset lean: '+favTxt+' favoured at this IV')\n                         : 'IV in the 30\\u201335% dead zone \\u2014 neither credit nor debit strongly favoured; your call';\n  wrap.appendChild(g);\n  const pair = long ? ['bps','bull_call'] : ['bcs','bear_put'];\n  const favKind = o.flags.iv_high ? pair[0] : o.flags.iv_low ? pair[1] : null;\n  const sps=o.spreads||{};\n  pair.forEach(k=>wrap.appendChild(optSpreadCard(k,sps[k],o,k===favKind,long)));\n  // neutral Iron Condor — shown ONLY for rangebound names (Wilder ADX below the threshold). A note explains the other cases.\n  const _adx=(o.flags&&o.flags.stock_adx!=null)?o.flags.stock_adx:null;\n  if(_adx==null){\n    const nt=document.createElement('div'); nt.className='ohsub';\n    nt.textContent='Iron Condor: ADX gating applies from the next scan (this data has no ADX reading yet)';\n    wrap.appendChild(nt);\n  } else if(_adx < ADX_RANGE_MAX){\n    wrap.appendChild(optCondorCard(sps.condor,o,o.flags.iv_high===true));\n  } else {\n    const nt=document.createElement('div'); nt.className='ohsub';\n    nt.textContent='Iron Condor hidden — ADX '+Math.round(_adx)+' shows a trend, not a range (needs < '+ADX_RANGE_MAX+')';\n    wrap.appendChild(nt);\n  }\n  const ft=document.createElement('div'); ft.className='ohfoot';\n  ft.textContent='Strikes/prices are a starting point priced at the MID \\u2014 verify live in IBKR. Each spread shows the expiry it scored best on within the scanned window. Flags highlight ruleset conditions; the decision is yours. Not financial advice.';\n  wrap.appendChild(ft);\n  return wrap;\n}\nfunction scanBuildFilters(){\n  const box=$('#scanFilters');\n  const metas=Object.values(SCAN.meta||{});\n  const hasCap=metas.some(m=>m&&m.mc!=null);\n  const hasPx =metas.some(m=>m&&m.px!=null);\n  const hasName=metas.some(m=>m&&m.name);\n  const inds=[...new Set(metas.map(m=>m&&m.industry).filter(Boolean))].sort();\n  const cw=$('#fCapWrap'), pw=$('#fPxWrap'), iw=$('#fIndWrap');\n  if(cw)cw.style.display=hasCap?'inline-flex':'none';\n  if(pw)pw.style.display=hasPx?'inline-flex':'none';\n  if(iw)iw.style.display=inds.length?'inline-flex':'none';\n  const sel=$('#fInd'); if(sel)sel.innerHTML='<option value=\"\">All industries<\u002Foption>'+inds.map(i=>'<option>'+i.replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;')+'<\u002Foption>').join('');\n  if(hasPx)pxSetBounds();\n  if(box)box.style.display=(hasCap||hasPx||inds.length)?'flex':'none';\n  const sr=$('#scanSort'), sn=$('#sortName'), sc=$('#sortCap'), si=$('#sortInd');\n  if(sn)sn.style.display=hasName?'':'none';\n  if(sc)sc.style.display=hasCap?'':'none';\n  if(si)si.style.display=inds.length?'':'none';\n  if((SCAN.sort.by==='cap'&&!hasCap)||(SCAN.sort.by==='industry'&&!inds.length)||(SCAN.sort.by==='name'&&!hasName)) SCAN.sort={by:'fresh',dir:1};\n  if(sr)sr.style.display=(SCAN.data&&(SCAN.data.rows||[]).length)?'flex':'none';\n  scanRenderSort();\n}\nfunction scanResetFilters(){\n  SCAN.filt={ capMin:null, capMax:null, pxMin:null, pxMax:null, ind:'', units:[] };\n  ['fCapMin','fCapMax'].forEach(id=>{ const e=$('#'+id); if(e)e.value=''; });\n  const s=$('#fInd'); if(s)s.value='';\n  pxSetBounds(); scanRenderUnits();\n}\nfunction scanSetUnit(u){\n  const i=SCAN.filt.units.indexOf(u);\n  if(i>=0)SCAN.filt.units.splice(i,1); else SCAN.filt.units.push(u);\n  scanRenderUnits(); scanRenderList();\n}\nfunction scanRenderUnits(){\n  document.querySelectorAll('#scanUnits .unitbtn').forEach(b=>{\n    const u=parseInt(b.getAttribute('data-unit'),10);\n    b.classList.toggle('on', SCAN.filt.units.indexOf(u)>=0);\n  });\n}\nfunction scanReadFilters(){\n  const num=id=>{ const e=$('#'+id), v=(e&&e.value!=='')?parseFloat(e.value):null; return (v!=null&&!isNaN(v))?v:null; };\n  const s=$('#fInd');\n  SCAN.filt.capMin=num('fCapMin'); SCAN.filt.capMax=num('fCapMax'); SCAN.filt.ind=(s&&s.value)||'';\n  scanRenderList();\n}\nfunction scanFmtCap(mc){ return '$'+(mc/1e9).toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1})+' B'; }\nfunction scanFmtCapShort(mc){ const b=mc/1e9; if(b>=1000)return '$'+(b/1000).toFixed(b>=10000?0:1)+'T'; if(b>=10)return '$'+b.toFixed(0)+'B'; return '$'+b.toFixed(1)+'B'; }\nfunction scanCmp(a,b){\n  const by=SCAN.sort.by, dir=SCAN.sort.dir, ma=SCAN.meta[a.t]||{}, mb=SCAN.meta[b.t]||{};\n  let c=0;\n  if(by==='ticker'){ c=(a.t<b.t?-1:a.t>b.t?1:0); }\n  else if(by==='name'){ const x=(ma.name||a.t).toLowerCase(), y=(mb.name||b.t).toLowerCase(); c=(x<y?-1:x>y?1:0); }\n  else if(by==='cap'){ const x=(ma.mc!=null?ma.mc:-Infinity), y=(mb.mc!=null?mb.mc:-Infinity); c=(x<y?-1:x>y?1:0); }\n  else if(by==='px'){ const x=(ma.px!=null?+ma.px:-Infinity), y=(mb.px!=null?+mb.px:-Infinity); c=(x<y?-1:x>y?1:0); }\n  else if(by==='unit'){ const x=(a.unit!=null?a.unit:-Infinity), y=(b.unit!=null?b.unit:-Infinity); c=(x<y?-1:x>y?1:0); }\n  else if(by==='industry'){ const x=(ma.industry||'\\uffff'), y=(mb.industry||'\\uffff'); c=(x<y?-1:x>y?1:0); }\n  else { c=(a.ago-b.ago); }\n  if(c===0) c=(a.t<b.t?-1:a.t>b.t?1:0);\n  return c*dir;\n}\nfunction scanSetSort(by){\n  if(SCAN.sort.by===by){ SCAN.sort.dir*=-1; }\n  else { SCAN.sort={ by, dir:(by==='cap'||by==='px'?-1:1) }; }\n  scanRenderSort(); scanRenderList();\n}\nfunction scanRenderSort(){\n  document.querySelectorAll('#scanSort .sortbtn').forEach(b=>{\n    const on=b.getAttribute('data-by')===SCAN.sort.by;\n    let base=b.getAttribute('data-label');\n    if(base==null){ base=b.textContent.replace(/\\s*[\\u2191\\u2193]\\s*$/,''); b.setAttribute('data-label',base); }\n    b.classList.toggle('on',on);\n    b.innerHTML=base+(on?' <span class=\"ar\">'+(SCAN.sort.dir>0?'\\u2191':'\\u2193')+'<\u002Fspan>':'');\n  });\n}\n/* ---- price drag slider ---- */\nfunction pxPct(v){ const r=PXSLIDER.max-PXSLIDER.min; return r>0?((v-PXSLIDER.min)/r*100):0; }\nfunction pxRender(){\n  const lo=$('#pxLo'), hi=$('#pxHi'), fill=$('#pxFill'), lbl=$('#pxLabel'); if(!lo)return;\n  const pl=pxPct(PXSLIDER.lo), ph=pxPct(PXSLIDER.hi);\n  lo.style.left=pl+'%'; hi.style.left=ph+'%';\n  if(fill){ fill.style.left=pl+'%'; fill.style.width=Math.max(0,ph-pl)+'%'; }\n  if(lbl){ const f=v=>'$'+Math.round(v).toLocaleString('en-US'); lbl.textContent=f(PXSLIDER.lo)+' \\u2013 '+f(PXSLIDER.hi)+(PXSLIDER.hi>=PXSLIDER.max?'+':''); }\n}\nfunction pxSetBounds(){\n  const ps=Object.values(SCAN.meta||{}).map(m=>m&&m.px).filter(v=>v!=null&&!isNaN(v));\n  let mx=100; if(ps.length){ mx=Math.max.apply(null,ps); mx=Math.max(10,Math.ceil(mx/10)*10); }\n  PXSLIDER.min=0; PXSLIDER.max=mx; PXSLIDER.lo=0; PXSLIDER.hi=mx; pxRender();\n}\nfunction pxApply(){\n  SCAN.filt.pxMin=(PXSLIDER.lo>PXSLIDER.min)?PXSLIDER.lo:null;\n  SCAN.filt.pxMax=(PXSLIDER.hi<PXSLIDER.max)?PXSLIDER.hi:null;\n  scanRenderList();\n}\nfunction pxValAt(clientX){\n  const s=$('#pxSlider'); if(!s||!s.getBoundingClientRect)return PXSLIDER.min;\n  const rc=s.getBoundingClientRect(); let p=(clientX-rc.left)/(rc.width||1); p=Math.max(0,Math.min(1,p));\n  return PXSLIDER.min + p*(PXSLIDER.max-PXSLIDER.min);\n}\nfunction pxDrag(which,startEv){\n  if(startEv&&startEv.preventDefault)startEv.preventDefault();\n  const move=e=>{ const cx=(e.touches&&e.touches[0])?e.touches[0].clientX:e.clientX; const v=pxValAt(cx);\n    if(which==='lo'){ PXSLIDER.lo=Math.min(v,PXSLIDER.hi); } else { PXSLIDER.hi=Math.max(v,PXSLIDER.lo); }\n    pxRender(); pxApply(); };\n  const up=()=>{ document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); };\n  document.addEventListener('pointermove',move); document.addEventListener('pointerup',up);\n}\nfunction scanApply(d){\n  SCAN.full=d; SCAN.meta=(d&&d.meta)||{};\n  if(!d){ SCAN.data=null; scanResetFilters(); scanBuildFilters(); scanRenderChips(); scanRenderList(); return; }\n  scanResetFilters(); scanBuildFilters();            // filter UI is meta-based, so it's built once and persists across timeframe switches\n  const initTf=(typeof S!=='undefined'&&S.tf)?S.tf:'1';\n  scanSetTf(initTf, true);\n  if(typeof chartOptSync==='function')chartOptSync(); // chart-panel options button picks up the freshly loaded opt block\n}\nfunction scanTfBlock(tf){\n  const d=SCAN.full; if(!d)return null;\n  if(d.tf && d.tf[tf]) return d.tf[tf];              // new file: 2-day / weekly blocks\n  if(tf==='1' && (d.rows||d.counts))                 // 1-day m.id);\n  oldestId=(oldestId===null)?m.id:Math.min(oldestId,m.id);\n  return true;\n}\nasync function fetchReactions(ids){\n  if(!ids.length)return;\n  try{\n    const {data}=await sb.from('message_reactions').select('*').in('message_id',ids);\n    ids.forEach(i=>{REACTS[i]={};});\n    (data||[]).forEach(r=>{const m=REACTS[r.message_id]=REACTS[r.message_id]||{};(m[r.emoji]=m[r.emoji]||new Set()).add(r.user_id);});\n  }catch(e){}\n}\nasync function fetchQuoted(id){\n  if(BYID[id]||QREF[id])return;\n  QREF[id]={display_name:'\\u2026',content:''};\n  try{\n    const {data}=await sb.from('messages').select('*').eq('id',id).maybeSingle();\n    if(data){QREF[id]=data;render(false);}\n  }catch(e){}\n}\n\n/* ---------------- chat: render ---------------- */\nconst QUICK=['\\ud83d\\udc4d','\\u2764\\ufe0f','\\ud83d\\ude02','\\ud83d\\ude2e','\\ud83d\\ude22','\\ud83d\\ude4f'];\nfunction quoteBlock(m){\n  const t=BYID[m.reply_to]||QREF[m.reply_to];\n  const dv=document.createElement('div');dv.className='quote';\n  const who=t?t.display_name:'', txt=t?(t.content?t.content.slice(0,90):(t.image_path?'\\ud83d\\udcf7 photo':'')): 'earlier message';\n  dv.innerHTML='<div class=\"qwho\">'+esc(who)+'<\u002Fdiv><div class=\"qtxt\">'+esc(txt)+'<\u002Fdiv>';\n  dv.onclick=e=>{e.stopPropagation();jumpTo(m.reply_to);};\n  if(!t)fetchQuoted(m.reply_to);\n  return dv;\n}\nfunction reactPillsFor(m){\n  const rx=REACTS[m.id]; if(!rx)return null;\n  const wrap=document.createElement('div');wrap.className='reacts';\n  Object.keys(rx).forEach(emo=>{\n    const set=rx[emo]; if(!set||!set.size)return;\n    const p=document.createElement('button');p.className='reactPill'+(ME&&set.has(ME.id)?' mine':'');\n    p.textContent=emo+(set.size>1?' '+set.size:'');\n    p.onclick=e=>{e.stopPropagation();toggleReact(m.id,emo);};\n    wrap.appendChild(p);\n  });\n  return wrap.children.length?wrap:null;\n}\nfunction actRow(m){\n  const r=document.createElement('div');r.className='actrow';\n  QUICK.forEach(emo=>{\n    const b=document.createElement('button');b.textContent=emo;\n    b.onclick=e=>{e.stopPropagation();selId=null;toggleReact(m.id,emo);};\n    r.appendChild(b);\n  });\n  const rep=document.createElement('button');rep.className='rep';rep.textContent='\\u21a9 Reply';\n  rep.onclick=e=>{e.stopPropagation();selId=null;setReply(m);render(false);};\n  r.appendChild(rep);\n  if(ME&&m.user_id===ME.id&&(Date.now()-new Date(m.created_at).getTime())<EDIT_WIN_MIN*60000){\n    const ed=document.createElement('button');ed.className='rep';ed.textContent='\\u270e Edit';\n    ed.onclick=e=>{e.stopPropagation();selId=null;setEdit(m);render(false);};\n    r.appendChild(ed);\n  }\n  return r;\n}\nfunction bubble(m,prev){\n  const row=document.createElement('div');\n  const mine=ME&&m.user_id===ME.id;\n  row.className='msgRow'+(mine?' me':'');row.dataset.id=m.id;\n  const b=document.createElement('div');b.className='bub';row.appendChild(b);\n  const samePrev=prev&&prev.user_id===m.user_id;\n  if(!mine&&!samePrev){\n    const w=document.createElement('span');w.className='who';w.style.color=nameColor(m.user_id||'');\n    w.textContent=m.display_name||'?';b.appendChild(w);\n  }\n  if(m.reply_to)b.appendChild(quoteBlock(m));\n  if(m.image_path){\n    const im=document.createElement('img');im.loading='lazy';im.src=imgUrl(m.image_path);im.alt='shared image';\n    im.onclick=e=>{e.stopPropagation();window.open(im.src,'_blank');};\n    im.onload=()=>{if(nearBottom()){const f=q('chatFeed');f.scrollTop=f.scrollHeight;}};\n    b.appendChild(im);\n  }\n  const body=document.createElement('div');body.className='body';\n  body.textContent=m.content||'';\n  const wh=document.createElement('span');wh.className='when';wh.textContent=(m.edited_at?'Edited \\u00b7 ':'')+hm(m.created_at);\n  body.appendChild(wh);\n  b.appendChild(body);\n  const rp=reactPillsFor(m); if(rp)b.appendChild(rp);\n  if(selId===m.id)b.appendChild(actRow(m));\n  b.onclick=e=>{\n    if(!ALLOWED)return;\n    selId=(selId===m.id)?null:m.id;\n    render(false);\n  };\n  return row;\n}\nfunction render(pinBottom){\n  const f=q('chatFeed'); if(!f)return;\n  const pin=pinBottom||nearBottom();\n  const fromBottom=f.scrollHeight-f.scrollTop;\n  f.innerHTML='';\n  if(!MSGS.length){\n    f.innerHTML='<div style=\"font-family:var(--mono);font-size:11px;color:var(--faint);text-align:center;padding:14px 0\">no messages yet \\u2014 say hello<\u002Fdiv>';\n    return;\n  }\n  let prev=null,prevDay='';\n  MSGS.forEach(m=>{\n    const dk=dayKey(m.created_at);\n    if(dk!==prevDay){\n      const c=document.createElement('div');c.className='dayChip';\n      c.innerHTML='<span>'+esc(dayLabel(m.created_at))+'<\u002Fspan>';\n      f.appendChild(c);prevDay=dk;prev=null;\n    }\n    f.appendChild(bubble(m,prev));prev=m;\n  });\n  if(pin)f.scrollTop=f.scrollHeight; else f.scrollTop=Math.max(0,f.scrollHeight-fromBottom);\n}\nfunction jumpTo(id){\n  const f=q('chatFeed');const el=f.querySelector('.msgRow[data-id=\"'+id+'\"]');\n  if(el){\n    el.scrollIntoView({block:'center'});\n    el.classList.add('flashMsg');setTimeout(()=>el.classList.remove('flashMsg'),1200);\n  }else if(!reachedTop){\n    loadOlder().then(()=>{const e2=f.querySelector('.msgRow[data-id=\"'+id+'\"]');if(e2){e2.scrollIntoView({block:'center'});e2.classList.add('flashMsg');setTimeout(()=>e2.classList.remove('flashMsg'),1200);}});\n  }\n}\n\n/* ---------------- chat: load + live ---------------- */\nasync function loadRecent(){\n  const f=q('chatFeed');f.innerHTML='<div style=\"font-family:var(--mono);font-size:11px;color:var(--faint)\">loading history\\u2026<\u002Fdiv>';\n  const {data,error}=await sb.from('messages').select('*').order('id',{ascending:false}).limit(60);\n  if(error){f.innerHTML='';cStatus('Could not load chat: '+error.message,'err');return;}\n  (data||[]).forEach(ingest);\n  if((data||[]).length<60)reachedTop=true;\n  await fetchReactions(MSGS.map(m=>m.id));\n  render(true);\n}\nasync function loadOlder(){\n  if(loadingOlder||reachedTop||oldestId===null)return;\n  loadingOlder=true;\n  try{\n    const {data,error}=await sb.from('messages').select('*').lt('id',oldestId).order('id',{ascending:false}).limit(60);\n    if(!error){\n      if(!data||data.length<60)reachedTop=true;\n      const fresh=(data||[]).filter(m=>ingest(m)).map(m=>m.id);\n      if(fresh.length){await fetchReactions(fresh);render(false);}\n    }\n  }finally{loadingOlder=false;}\n}\n/* ---------------- new-message alerts: sound + vibration + system notification ---------------- */\nfunction ensureAudio(){ try{ if(!audioCtx){const AC=window.AudioContext||window.webkitAudioContext; if(AC)audioCtx=new AC();} if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume(); }catch(e){} }\nfunction tone(freq,start,dur,peak){ const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination);\n  g.gain.setValueAtTime(0.0001,start); g.gain.exponentialRampToValueAtTime(peak||0.16,start+0.012); g.gain.exponentialRampToValueAtTime(0.0001,start+dur); o.start(start); o.stop(start+dur+0.02); }\nfunction beep(){ try{ ensureAudio(); if(!audioCtx)return; const t=audioCtx.currentTime; tone(784,t,0.16); tone(1046,t+0.14,0.22); }catch(e){} }   // gentle two-note ding\nfunction setAlertsBtn(){ const b=q('chatAlertsBtn'); if(!b)return; b.textContent = alertsOn?'\\uD83D\\uDD14 Alerts on':'\\uD83D\\uDD14 Alerts off'; b.classList.toggle('on',alertsOn); }\nfunction notifyNewMessage(m){\n  try{\n    if(!alertsOn) return;\n    if(ME && m.user_id===ME.id) return;                                     // never alert on my own posts\n    beep();\n    try{ navigator.vibrate && navigator.vibrate([40,60,40]); }catch(e){}     // Android only; ignored elsewhere\n    if('Notification' in window && Notification.permission==='granted'){\n      const who=(m.display_name||'New message');\n      const body=(m.content?String(m.content).slice(0,140):(m.image_path?'\\uD83D\\uDCF7 sent an image':''))||'New message';\n      const n=new Notification('PAM chat \\u00b7 '+who,{body:body,tag:'pam-chat',renotify:true});\n      n.onclick=()=>{ try{window.focus();}catch(e){} const t=document.querySelector('.tabbtn[data-tab=\"chat\"]'); if(t)t.click(); try{n.close();}catch(e){} };\n    }\n  }catch(e){}\n}\nfunction initAlerts(){\n  try{ alertsOn = LS.get('pam_alerts')==='1'; }catch(e){ alertsOn=false; }\n  setAlertsBtn();\n  const b=q('chatAlertsBtn'); if(!b)return;\n  b.onclick=async()=>{\n    if(!alertsOn){\n      ensureAudio();                                                        // unlock audio inside the tap gesture\n      if('Notification' in window && Notification.permission==='default'){ try{ await Notification.requestPermission(); }catch(e){} }\n      alertsOn=true; try{LS.set('pam_alerts','1');}catch(e){} setAlertsBtn(); beep();\n      const canPop=('Notification' in window && Notification.permission==='granted');\n      const noPop =('Notification' in window && Notification.permission==='denied');\n      if(!('Notification' in window)) cStatus('Sound alerts on (this browser can\\u2019t show pop-up banners).','ok');\n      else if(noPop) cStatus('Sound alerts on. Pop-up banners are blocked for this site \\u2014 turn on notifications for it in your browser settings to also get banners.','');\n      else if(canPop) cStatus('Alerts on \\u2014 a sound + a pop-up fire when someone posts, as long as this tab is open.','ok');\n      else cStatus('Sound alerts on. (Pop-up banners not enabled.)','ok');\n    } else {\n      alertsOn=false; try{LS.set('pam_alerts','0');}catch(e){} setAlertsBtn(); cStatus('Alerts off.','');\n    }\n  };\n}\nfunction onNewMsg(m){\n  if(!ingest(m))return;\n  if(m.reply_to&&!BYID[m.reply_to]&&!QREF[m.reply_to])fetchQuoted(m.reply_to);\n  const active = window.__pamTab==='chat' && !document.hidden && (document.hasFocus?document.hasFocus():true);\n  if(active){ render(false); }\n  else{\n    if(!(ME&&m.user_id===ME.id)){ unread++; updateBadge(); }   // badge counts other people's posts only\n    render(false);\n    notifyNewMessage(m);                                       // sound + vibration + system pop-up (self + toggle guarded inside)\n  }\n}\nfunction subscribe(){\n  if(chan){try{sb.removeChannel(chan);}catch(e){}}\n  chan=sb.channel('pam-chat')\n    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},p=>onNewMsg(p.new))\n    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages'},p=>{\n      const n=p.new,m=BYID[n.id];if(m){Object.assign(m,n);render(false);}\n    })\n    .on('postgres_changes',{event:'INSERT',schema:'public',table:'message_reactions'},p=>{\n      const r=p.new,m=REACTS[r.message_id]=REACTS[r.message_id]||{};\n      (m[r.emoji]=m[r.emoji]||new Set()).add(r.user_id);render(false);\n    })\n    .on('postgres_changes',{event:'DELETE',schema:'public',table:'message_reactions'},p=>{\n      const r=p.old||{};const m=REACTS[r.message_id];\n      if(m&&m[r.emoji]){m[r.emoji].delete(r.user_id);render(false);}\n    })\n    .subscribe();\n}\nasync function pollNew(){\n  if(!ME||!ALLOWED)return;\n  try{\n    const {data}=await sb.from('messages').select('*').gt('id',lastId).order('id',{ascending:true}).limit(100);\n    (data||[]).forEach(onNewMsg);\n    const vis=MSGS.slice(-60).map(m=>m.id);\n    await fetchReactions(vis);\n    if(vis.length){\n      const {data:fresh}=await sb.from('messages').select('id,content,edited_at').in('id',vis);\n      (fresh||[]).forEach(r=>{const m=BYID[r.id];if(m){m.content=r.content;m.edited_at=r.edited_at;}});\n    }\n    render(false);\n  }catch(e){}\n}\n\n/* ---------------- chat: reactions + reply ---------------- */\nasync function toggleReact(id,emo){\n  if(!ME||!ALLOWED)return;\n  const m=REACTS[id]=REACTS[id]||{};const set=m[emo]=m[emo]||new Set();\n  const mine=set.has(ME.id);\n  if(mine)set.delete(ME.id);else set.add(ME.id);   /* optimistic; realtime/poll reconciles */\n  render(false);\n  try{\n    if(mine)await .message,'err');}\n}\nasync function sendMsg(){\n  if(!ME||!ALLOWED)return;\n  const ta=q('chatText'),btn=q('chatSend');\n  const txt=ta.value.trim();\n  if(!txt&&!pending)return;\n  btn.disabled=true;btn.textContent='\\u2026';\n  try{\n    if(editTarget){\n      if(!txt)throw new Error('edited message cannot be empty');\n      const tgt=editTarget;\n      const {data,error}=await sb.from('messages').update({content:txt,edited_at:new Date().toISOString()}).eq('id',tgt.id).select();\n      if(error)throw new Error(error.message);\n      if(!data||!data.length)throw new Error('edit window ('+EDIT_WIN_MIN+' min) has passed');\n      tgt.content=txt;tgt.edited_at=data[0].edited_at;\n      ta.value='';clearReply();cStatus('');render(false);\n      btn.disabled=false;btn.textContent='Send';\n      return;\n    }\n    let image_path=null;\n    if(pending){\n      image_path=ME.id+'/'+Date.now()+'-'+Math.random().toString(36).slice(2,8)+'.jpg';\n      const {error:ue}=await sb.storage.from('chat-images').upload(image_path,pending,{contentType:'image/jpeg'});\n      if(ue)throw new Error('image upload failed: '+ue.message);\n    }\n    const {error}=await sb.from('messages').insert({user_id:ME.id,display_name:MYNAME||ME.email.split('@')[0],content:txt||null,image_path,reply_to:replyTo?replyTo.id:null});\n    if(error)throw new Error(error.code==='42501'?'not authorized \\u2014 ask the owner to add your email':error.message);\n    ta.value='';clearPending();clearReply();cStatus('');\n    pollNew();\n  }catch(e){cStatus('Send failed: '+e.message,'err');}\n  btn.disabled=false;btn.textContent='Send';\n}\n\n/* ---------------- composer emoji palette ---------------- */\nconst EMOJIS=['\\ud83d\\ude00','\\ud83d\\ude02','\\ud83e\\udd23','\\ud83d\\ude05','\\ud83d\\ude0a','\\ud83d\\ude09','\\ud83d\\ude0d','\\ud83d\\ude0e','\\ud83e\\udd14','\\ud83d\\ude34','\\ud83d\\ude2d','\\ud83d\\ude21','\\ud83e\\udd73','\\ud83e\\udd1d','\\ud83d\\udc4d','\\ud83d\\udc4e','\\ud83d\\udc4f','\\ud83d\\ude4f','\\ud83d\\udcaa','\\ud83d\\udd25','\\ud83d\\ude80','\\ud83d\\udcc8','\\ud83d\\udcc9','\\ud83d\\udcb0','\\ud83d\\udc8e','\\ud83d\\udc02','\\ud83d\\udc3b','\\u26a0\\ufe0f','\\u2705','\\u274c','\\ud83c\\udfaf','\\u23f3','\\u2764\\ufe0f','\\ud83d\\udcaf','\\ud83e\\udd1e','\\ud83d\\ude4c','\\ud83d\\ude2c','\\ud83e\\udd2f','\\ud83d\\ude31','\\ud83c\\udf40'];\nfunction buildPal(){\n  const pal=q('emoPal'); if(pal.dataset.built)return; pal.dataset.built='1';\n  EMOJIS.forEach(e=>{\n    const b=document.createElement('button');b.type='button';b.textContent=e;\n    b.onclick=()=>{\n      const ta=q('chatText');\n      const s=ta.selectionStart!=null?ta.selectionStart:ta.value.length;\n      const en=ta.selectionEnd!=null?ta.selectionEnd:s;\n      ta.value=ta.value.slice(0,s)+e+ta.value.slice(en);\n      ta.focus();ta.selectionStart=ta.selectionEnd=s+e.length;\n    };\n    pal.appendChild(b);\n  });\n}\n\n/* ---------------- wiring ---------------- */\nq('chatSendLink').onclick=sendLink;\nq('chatEmail').addEventListener('keydown',e=>{if(e.key==='Enter')sendLink();});\nq('sbSignOut').onclick=signOut;\nq('chatSend').onclick=sendMsg;\nq('chatAttach').onclick=()=>{if(editTarget){cStatus('finish editing first \\u2014 images cannot be changed by an edit','err');return;}q('chatFile').click();};\nq('chatFile').addEventListener('change',e=>takeImage(e.target.files&&e.target.files[0]));\nq('chatPreviewX').onclick=clearPending;\nq('chatReplyX').onclick=clearReply;\nq('chatEmoji').onclick=()=>{buildPal();const p=q('emoPal');p.style.display=p.style.display==='flex'?'none':'flex';};\nq('chatText').addEventListener('keydown',e=>{\n  if(e.key==='Enter'&&!e.shiftKey&&window.innerWidth>980){e.preventDefault();sendMsg();}\n});\nq('chatText').addEventListener('paste',e=>{\n  const items=(e.clipboardData||{}).items||[];\n  for(const it of items){if(it.type&&it.type.indexOf('image')===0){e.preventDefault();takeImage(it.getAsFile());return;}}\n});\nq('chatFeed').addEventListener('scroll',()=>{if(q('chatFeed').scrollTop<40)loadOlder();});\n/* opening the Chat tab clears the unread badge and pins to the newest message */\nsetInterval(()=>{\n  if(window.__pamTab==='chat'&&!document.hidden&&(document.hasFocus?document.hasFocus():true)&&unread){\n    unread=0;updateBadge();\n    const f=q('chatFeed');f.scrollTop=f.scrollHeight;\n  }\n},400);\ninitAlerts();\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
