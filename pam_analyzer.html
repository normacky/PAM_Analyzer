n){const ch=c.map((x,i)=>i===0?0:x-c[i-1]);\n  const ag=rma(ch.map(d=>Math.max(d,0)),n), al=rma(ch.map(d=>Math.max(-d,0)),n), o=c.map(_=>null);\n  for(let i=0;i<c.length;i++){if(ag[i]==null||al[i]==null)continue;o[i]=al[i]===0?100:100-100/(1+ag[i]/al[i]);}return o;}\nfunction macdCalc(c,f,s,sig){const ef=ema(c,f),es=ema(c,s);\n  const line=c.map((_,i)=>(i<s-1)?null:ef[i]-es[i]);\n  const sg=ema(line,sig), hist=line.map((v,i)=>(v==null||sg[i]==null)?null:v-sg[i]);\n  return {line,sig:sg,hist};}\nfunction stochSlow(b,kLook,dSmooth){                                   // TOS StochasticSlow: SlowK=SMA(rawK,D), SlowD=SMA(SlowK,D)\n  const raw=b.map((x,i)=>{if(i<kLook-1)return null;let hh=-1e9,ll=1e9;\n    for(let j=i-kLook+1;j<=i;j++){hh=Math.max(hh,b[j].high);ll=Math.min(ll,b[j].low);}\n    return hh===ll?50:100*(b[i].close-ll)/(hh-ll);});\n  const k=smaN(raw,dSmooth); return {k, d:smaN(k,dSmooth)};}\nfunction atrWilder(b,n){const tr=b.map((x,i)=>i===0?x.high-x.low:Math.max(x.high-x.low,Math.abs(x.high-b[i-1].close),Math.abs(x.low-b[i-1].close)));return rma(tr,n);}\nfunction classifyBar(b,avg){\n  const o=b.open,h=b.high,l=b.low,c=b.close,rng=h-l;\n  if(rng<=0)return{type:'doji',dir:null,flush:false,bf:0};\n  const bf=Math.abs(c-o)/rng,top3=l+rng*2/3,bot3=l+rng/3,flush=(bf>=2/3)&&avg&&(rng>=2*avg);\n  if(o>=top3&&c>=top3)return{type:'PIN',dir:'bull',flush,bf};\n  if(o<=bot3&&c<=bot3)return{type:'PIN',dir:'bear',flush,bf};\n  if(bf>=2/3){if(c>o)return{type:flush?'FLUSH-UP':'MARK-UP',dir:'bull',flush,bf};\n              return{type:flush?'FLUSH-DOWN':'MARK-DOWN',dir:'bear',flush,bf};}\n  // Ice Cream: body ≈ 1/2 of range, close in the correct third. The window runs up to the\n  // Mark boundary (2/3) — the old 0.4–0.6 cap left a dead zone (body 60–66.7% of range\n  // classified as \"neutral\"), which silently disqualified real reclaim bars as EXEs.\n  if(bf>=0.4&&bf<2/3){if(c>=top3)return{type:'ICE-CREAM',dir:'bull',flush:false,bf};\n                      if(c<=bot3)return{type:'ICE-CREAM',dir:'bear',flush:false,bf};}\n  return{type:'neutral',dir:null,flush:false,bf};\n}\nfunction pivots(b,kl,kr){\n  // v0.19 — ASYMMETRIC swing pivots: kl bars of LEFT precedence, kr bars of right confirmation.\n  // Until v0.18 this was symmetric (3 left AND 3 right), which was never a course rule — the deck\n  // never defines a swing mechanically, and \"Left Precedence\" earns its name from the bars to the\n  // LEFT. Demanding 3 higher lows to the right as well means a low that is undercut within 2-3 bars\n  // (exactly what happens in a fast pullback) never becomes an LP at all, so no force can ever form\n  // against it. Real case (LITE weekly, Jul 2026): the 776.01 shelf was disqualified purely because\n  // the 2nd and 3rd bars to its right were lower, and a textbook UC1 went unlabelled. The right side\n  // is only confirmation lag; kr=1 keeps a level from being called on the bar itself while still\n  // recognising it one bar later. The un-breached rule in enrich() prunes the rest.\n  if(kr==null)kr=1; if(kl==null)kl=3;\n  const hi=b.map(_=>false),lo=b.map(_=>false);\n  for(let i=kl;i<b.length-kr;i++){let mh=-1e9,ml=1e9;\n    for(let j=i-kl;j<=i+kr;j++){mh=Math.max(mh,b[j].high);ml=Math.min(ml,b[j].low);}\n    if(b[i].high===mh)hi[i]=true;if(b[i].low===ml)lo[i]=true;}\n  return{hi,lo};}\nfunction enrich(bars){\n  const c=bars.map(b=>b.close),s50=sma(c,50),s20=sma(c,20),s200=sma(c,200),a=atr(bars,14),{hi,lo}=pivots(bars,3,1);\n  const rg=bars.map(b=>b.high-b.low);\n  bars.forEach((b,i)=>{const w=rg.slice(Math.max(0,i-10),i),avg=w.length?w.reduce((x,y)=>x+y,0)/w.length:0;\n    b.cls=classifyBar(b,avg);b.sma50=s50[i];b.sma20=s20[i];b.sma200=s200[i];b.atr=a[i];b.swingH=hi[i];b.swingL=lo[i];b.i=i;});\n  // LP (Left Precedence) level lists over the FULL loaded history — a swing level is only an LP\n  // while it stays un-breached, so record the FIRST bar whose CLOSE crossed it (\"breach\").\n  // findForce() then treats a level as alive at bar i unless it was close-breached before the\n  // current force window (a panic close through the level DURING the force itself is allowed).\n  bars.lpLows=[];bars.lpHighs=[];\n  bars.forEach((b,j)=>{\n    if(b.swingL){let br=null;for(let t=j+1;t<bars.length;t++)if(bars[t].close<b.low){br=t;break;}\n      bars.lpLows.push({j,lv:b.low,breach:br});}\n    if(b.swingH){let br=null;for(let t=j+1;t<bars.length;t++)if(bars[t].close>b.high){br=t;break;}\n      bars.lpHighs.push({j,lv:b.high,breach:br});}\n  });\n  // sub-panel indicators (Stoch Slow 10·SMA10, RSI 14 Wilder, MACD 12·26·9 EMA, ATR 14 Wilder)\n  const _st=stochSlow(bars,10,10), _rsi=rsiWilder(c,14), _mac=macdCalc(c,12,26,9), _atrw=atrWilder(bars,14);\n  bars.forEach((b,i)=>{b.stochK=_st.k[i];b.stochD=_st.d[i];b.rsi=_rsi[i];\n    b.macd=_mac.line[i];b.macdSig=_mac.sig[i];b.macdHist=_mac.hist[i];b.atrW=_atrw[i];});\n  // Donchian channels — prior-N high/low (exclude current bar), Turtle 10/20/55\n  const chan=(arr,n,kind)=>{const out=bars.map(_=>null);\n    for(let i=0;i<bars.length;i++){if(i<n)continue;let v=kind==='hi'?-1e9:1e9;\n      for(let j=i-n;j<i;j++)v=kind==='hi'?Math.max(v,bars[j].high):Math.min(v,bars[j].low);out[i]=v;}return out;};\n  const hi10=chan(0,10,'hi'),lo10=chan(0,10,'lo'),hi20=chan(0,20,'hi'),lo20=chan(0,20,'lo'),hi55=chan(0,55,'hi'),lo55=chan(0,55,'lo');\n  bars.forEach((b,i)=>{b.hi10=hi10[i];b.lo10=lo10[i];b.hi20=hi20[i];b.lo20=lo20[i];b.hi55=hi55[i];b.lo55=lo55[i];});\n  // ---- Turtle state machine (rebuilt) ----\n  // ONE trade = entry (·1) + up to 3 pyramid adds, ONE per bar, each requiring a genuine +0.5N extension\n  // measured from the running fill price (NOT the channel level). Single exit: channel (10/20-day) OR 2N stop.\n  // N = ATR(20). Reverse mirrors on the low side. Each trade is recorded so the chart can group it.\n  const N=atr(bars,20);\n  function runTurtle(long){\n    const U=long?'ttUnit':'rtUnit',SY=long?'ttSys':'rtSys',EX=long?'ttExit':'rtExit',ES=long?'ttExSys':'rtExSys',ER=long?'ttRsn':'rtRsn';\n    const trades=[]; let cur=null,lastFill=0,stop=0;\n    for(let i=0;i<bars.length;i++){\n      const b=bars[i],n=N[i]; if(n==null||b.hi20==null)continue;\n      if(!cur){                                   // flat → look for an entry\n        let sys=0;\n        if(long){ if(b.hi55!=null&&b.high>b.hi55)sys=2; else if(b.high>b.hi20)sys=1; }\n        else    { if(b.lo55!=null&&b.low<b.lo55)sys=2; else if(b.lo20!=null&&b.low<b.lo20)sys=1; }\n        if(sys){ lastFill=b.close; stop=long?b.close-2*n:b.close+2*n;   // add/stop reference = real fill\n          cur={sys,entry:i,exit:null,units:1,reason:null}; b[U]=1; b[SY]='S'+sys; }\n      } else {                                    // in a trade → exit first, else maybe ONE add\n        const exitChan = long\n          ? (cur.sys===1 ? (b.lo10!=null&&b.low<b.lo10) : (b.lo20!=null&&b.low<b.lo20))\n          : (cur.sys===1 ? (b.hi10!=null&&b.high>b.hi10) : (b.hi20!=null&&b.high>b.hi20));\n        const stopHit = long ? b.low<stop : b.high>stop;\n        if(stopHit||exitChan){ cur.exit=i; cur.reason=stopHit?'stop':'chan';\n          b[EX]=true; b[ES]='S'+cur.sys; b[ER]=cur.reason; trades.push(cur); cur=null; }\n        else if(cur.units<4 && (long ? b.high>=lastFill+0.5*n : b.low<=lastFill-0.5*n)){\n          cur.units++; lastFill = long?lastFill+0.5*n:lastFill-0.5*n;\n          stop = long?lastFill-2*n:lastFill+2*n; b[U]=cur.units; b[SY]='S'+cur.sys; }\n      }\n    }\n    if(cur) trades.push(cur);\n    return trades;\n  }\n  bars.ttTrades=runTurtle(true); bars.rtTrades=runTurtle(false);\n  return bars;\n}\n\n/* ---- trigger scanner (ported from scan.py) ---- */\nconst ENGINE_VERSION='v0.19';\nfunction findForce(bars,i,FW=5){\n  // Force detection, v0.15 rules (v0.18: also returns j — the LP entry's own bar index,\n  // which is point X for the majority-flush geometry):\n  //  - LP levels come from the FULL loaded history (weekly 3Y window scans 3Y back, 2-Day 1Y\n  //    window scans 1Y back), not a 15-bar peephole — but only levels still un-breached count:\n  //    a level is dead once any bar CLOSED through it BEFORE the current force window.\n  //  - MULTI-BAR force: the pierce may happen on any of the last FW(=5) bars (the panic bar is\n  //    often a long-tailed neutral candle); bar i just has to be the one closing back on the\n  //    correct side of the LP. Matches the course's \"EXE closes at/above the LP within ~5 bars\".\n  const b=bars[i],w0=Math.max(0,i-FW+1);\n  let pHi=-1e9,pLo=1e9;for(let t=w0;t<=i;t++){pHi=Math.max(pHi,bars[t].high);pLo=Math.min(pLo,bars[t].low);}\n  const alive=e=>e.j<i-2&&(e.breach===null||e.breach>=w0);   // formed ≥3 bars back, not close-breached earlier\n  const top=(bars.lpHighs||[]).filter(e=>alive(e)&&e.lv<pHi&&e.lv>=b.close);\n  if(top.length){const e=top.reduce((a,c)=>c.lv>a.lv?c:a);return{f:'top',lv:e.lv,j:e.j};}\n  const bot=(bars.lpLows||[]).filter(e=>alive(e)&&e.lv>pLo&&e.lv<=b.close);\n  if(bot.length){const e=bot.reduce((a,c)=>c.lv<a.lv?c:a);return{f:'bottom',lv:e.lv,j:e.j};}\n  return{f:null,lv:null,j:null};\n}\nfunction majorityFlush(bars,i,f){\n  // v0.18 — the decks' \"majority flush\" MOVE test (Lessons 9/19), two parts:\n  //  GEOMETRY (deck-exact): X = the LP's own level (entry bar j); Y = the opposite\n  //  extreme to the RIGHT of X's bar; 50% line = midpoint of X–Y; the FINAL leg into\n  //  the LP must START at/beyond that 50% line — i.e. the leg traversed the majority\n  //  of the X–Y distance.\n  //  STEEPNESS (framework, skill §2.2): a flush move is the steep >70° run vs the ~45°\n  //  wave; per the owner-confirmed framework a flush MOVE needn't contain any single\n  //  flush BAR, so impulsiveness is measured as speed: the leg's per-bar traverse must\n  //  be ≥ 1.5× ATR(14). Without this test every ordinary pullback would pass geometry\n  //  trivially (its leg starts at Y itself). 1.5× is a documented judgment call.\n  //  Leg origin is operationalised as the opposite extreme over the 12 bars before the\n  //  force window's pierce bar (judgment call, documented).\n  // Implementation note: the leg origin is chosen to MAXIMISE steepness among the\n  // candidate bars beyond the 50% line within the 12 bars before the pierce — i.e. the\n  // test asks \"does there exist a start point at/beyond the midpoint from which the\n  // move into the pierce averaged ≥ 1.5×ATR per bar?\" Anchoring the origin to the\n  // absolute extreme instead would dilute a fast strike across any plateau before it.\n  const LEG=12,atr=bars[i].atr||1e-9,TH=1.5*atr;\n  if(f.f==='bottom'){\n    let yHi=-1e9;for(let t=f.j+1;t<=i;t++)yHi=Math.max(yHi,bars[t].high);\n    const fifty=f.lv+(yHi-f.lv)/2;\n    let pj=i,pLo=1e9;for(let t=Math.max(0,i-4);t<=i;t++)if(bars[t].low<pLo){pLo=bars[t].low;pj=t;}\n    let best=-1,ls=null;\n    for(let t=Math.max(0,pj-LEG);t<pj;t++){if(bars[t].high<fifty)continue;\n      const sp=(bars[t].high-pLo)/(pj-t);if(sp>best){best=sp;ls=bars[t].high;}}\n    return{ok:ls!=null&&best>=TH,fifty,legStart:ls,yExt:yHi,speed:best,steep:best>=TH};\n  }\n  let yLo=1e9;for(let t=f.j+1;t<=i;t++)yLo=Math.min(yLo,bars[t].low);\n  const fifty=f.lv-(f.lv-yLo)/2;\n  let pj=i,pHi=-1e9;for(let t=Math.max(0,i-4);t<=i;t++)if(bars[t].high>pHi){pHi=bars[t].high;pj=t;}\n  let best=-1,ls=null;\n  for(let t=Math.max(0,pj-LEG);t<pj;t++){if(bars[t].low>fifty)continue;\n    const sp=(pHi-bars[t].low)/(pj-t);if(sp>best){best=sp;ls=bars[t].low;}}\n  return{ok:ls!=null&&best>=TH,fifty,legStart:ls,yExt:yLo,speed:best,steep:best>=TH};\n}\nfunction biggerRetracement(bars,i,f,yExt){\n  // v0.18 — UR2/DR2 entry rule 1: the current retracement must be BIGGER than the prior\n  // one in the same trend. Current = |Y − X|. Prior = the last completed counter-trend\n  // pivot swing strictly before X's bar (swingH→swingL pair via the k=3 pivot flags).\n  // If no prior pair exists in loaded history the rule is unverifiable — reported as\n  // unmeasurable and the label proceeds with a caveat (highlight-not-filter).\n  const cur=Math.abs(yExt-f.lv);\n  let a=-1,b2=-1;\n  if(f.f==='bottom'){ // downtrend: prior retracement = last swingH before X, and the swingL before it\n    for(let t=f.j-1;t>=0;t--)if(bars[t].swingH){a=t;break;}\n    if(a>=0)for(let t=a-1;t>=0;t--)if(bars[t].swingL){b2=t;break;}\n    if(a<0||b2<0)return{ok:false,unmeasurable:true,cur,prev:null};\n    const prev=bars[a].high-bars[b2].low;\n    return{ok:cur>prev,unmeasurable:false,cur,prev};\n  }\n  for(let t=f.j-1;t>=0;t--)if(bars[t].swingL){a=t;break;}\n  if(a>=0)for(let t=a-1;t>=0;t--)if(bars[t].swingH){b2=t;break;}\n  if(a<0||b2<0)return{ok:false,unmeasurable:true,cur,prev:null};\n  const prev=bars[b2].high-bars[a].low;\n  return{ok:cur>prev,unmeasurable:false,cur,prev};\n}\nfunction nearSMA(bars,i){\n  // v0.18 — UC/DC entry rule 2: \"structure forms near or test 20/50 SMA\".\n  // Tested = any of the last 5 bars straddles the 20 or 50 SMA; near = current close\n  // within 1 ATR of either (owner-ratified tolerance).\n  const b=bars[i],atr=b.atr||0;\n  for(let t=Math.max(0,i-4);t<=i;t++){const x=bars[t];\n    for(const s of [x.sma20,x.sma50])if(s!=null&&x.low<=s&&x.high>=s)return true;}\n  for(const s of [b.sma20,b.sma50])if(s!=null&&Math.abs(b.close-s)<=atr)return true;\n  return false;\n}\nfunction contGates(bars,i,dir){\n  // v0.18 — the UC/DC deck gates (Lessons 16/17):\n  //  (1) origin A/B = the trend-side extreme over the 12 bars before the pierce; NO\n  //      flush bar in the TREND direction among the 3 bars ending at the origin\n  //      (\"no flush up bar within 3 preceding bars leading to point A/B\") — flush bar\n  //      per the framework: a Mark Up/Down bar ≥ 2× the trailing-10-bar average range.\n  //  (2) near/test 20 or 50 SMA (nearSMA above).\n  //  (3) EXE below point C / above point D: the EXE close must sit on the early side of\n  //      the deepest interior bounce between origin and now; falls back to the origin\n  //      extreme when the pullback is monotone. Judgment call, documented.\n  const LEG=12,b=bars[i];\n  if(dir==='up'){\n    let pj=i,pLo=1e9;for(let t=Math.max(0,i-4);t<=i;t++)if(bars[t].low<pLo){pLo=bars[t].low;pj=t;}\n    let A=Math.max(0,pj-LEG),hi=-1e9;\n    for(let t=Math.max(0,pj-LEG);t<pj;t++)if(bars[t].high>hi){hi=bars[t].high;A=t;}\n    let noFlush=true;for(let t=Math.max(0,A-2);t<=A;t++)if(bars[t].cls.type==='FLUSH-UP')noFlush=false;\n    let C=-1e9;for(let t=A+1;t<i;t++)C=Math.max(C,bars[t].high);if(C<-1e8)C=hi;\n    return{ok:noFlush&&nearSMA(bars,i)&&b.close<C,noFlush,near:nearSMA(bars,i),early:b.close<C};\n  }\n  let pj=i,pHi=-1e9;for(let t=Math.max(0,i-4);t<=i;t++)if(bars[t].high>pHi){pHi=bars[t].high;pj=t;}\n  let A=Math.max(0,pj-LEG),lo=1e9;\n  for(let t=Math.max(0,pj-LEG);t<pj;t++)if(bars[t].low<lo){lo=bars[t].low;A=t;}\n  let noFlush=true;for(let t=Math.max(0,A-2);t<=A;t++)if(bars[t].cls.type==='FLUSH-DOWN')noFlush=false;\n  let D=1e9;for(let t=A+1;t<i;t++)D=Math.min(D,bars[t].low);if(D>1e8)D=lo;\n  return{ok:noFlush&&nearSMA(bars,i)&&b.close>D,noFlush,near:nearSMA(bars,i),early:b.close>D};\n}\nfunction legsInPullback(bars,i,dir,win=14){\n  if(dir==='up'){let th=Math.max(0,i-win);for(let j=Math.max(0,i-win);j<i;j++)if(bars[j].swingH)th=j;\n    let n=0;for(let j=th;j<i;j++)if(bars[j].swingL)n++;return n;}\n  let tl=Math.max(0,i-win);for(let j=Math.max(0,i-win);j<i;j++)if(bars[j].swingL)tl=j;\n  let n=0;for(let j=tl;j<i;j++)if(bars[j].swingH)n++;return n;\n}\nfunction isInside(m,b){return b.high<=m.high&&b.low>=m.low;}\nfunction fsAtLP(bars,i,dir,pierceExtreme){\n  // v0.17 — deck's \"force bottom/top SCENARIO\" check for a confirmed inside-bar Force Strike:\n  // did the strike ALSO false-break a live Left Precedence level, with the EXE (bar i)\n  // closing back at/on the correct side of it? If yes, that LP is returned and the trigger\n  // is the standalone-tradeable case per the course; if not, the FS is formation-only.\n  // Breach tolerance mirrors findForce: a close-through during the strike cluster itself\n  // is part of the trap, but a close-breach BEFORE it kills the level.\n  const b=bars[i];\n  const alive=e=>e.j<i-2&&(e.breach===null||e.breach>=Math.max(0,i-4));\n  if(dir==='bull'){\n    const c=(bars.lpLows||[]).filter(e=>alive(e)&&pierceExtreme<e.lv&&b.close>=e.lv).map(e=>e.lv);\n    return c.length?Math.min(...c):null;\n  }\n  const c=(bars.lpHighs||[]).filter(e=>alive(e)&&pierceExtreme>e.lv&&b.close<=e.lv).map(e=>e.lv);\n  return c.length?Math.max(...c):null;\n}\nfunction forceStrike(bars,i){\n  // Force Strike, v0.17 — realigned to the course deck (Lesson 8, Alson Chew), per the\n  // owner's clarifications (11 Jul 2026) on how the deck's rules attach:\n  //  - the mother/baby inside-bar pair is MANDATORY and CONSECUTIVE: the baby is the\n  //    single bar immediately after the mother, inside (or equal to) the mother's range.\n  //    v0.16's \"LP route\" (FS without an inside pair) is RETIRED: per the deck the LP is\n  //    an ADDITIONAL condition (\"force bottom/top scenario\"), never a substitute.\n  //  - the false break and the EXE close are ONE AND THE SAME BAR: the Force Strike bar\n  //    itself pierces the mother's extreme intrabar and closes back inside, and is a\n  //    same-direction EXE (PIN / Ice Cream / Mark Up-Down; never flush or neutral).\n  //    Only bar i's own extreme and close are tested — earlier bars' behaviour is\n  //    irrelevant to the check.\n  //  - that strike bar must occur within 3 bars of the baby (\"Max cluster of 3 Bars\"):\n  //    i - (m+1) <= 3.\n  //  - judgment call retained from v0.15: \"returns within Mother Bar range\" is enforced\n  //    on the trapped side only (bull: close ≥ mother low). An EXE strong enough to\n  //    close ABOVE the mother high is more bullish, not disqualifying.\n  //  - lp field: non-null when the strike bar also pierced a live LP and closed back\n  //    at/on the correct side of it — the deck's force-bottom/top scenario, the\n  //    standalone-tradeable case. Null = valid formation, but no LP involved.\n  const b=bars[i],cls=b.cls;\n  if(cls.flush||cls.type==='neutral'||!cls.dir)return{d:null,lv:null,lp:null};\n  for(let m=Math.max(0,i-4);m<i-1;m++){        // strike bar within 3 bars of baby: i-(m+1)<=3\n    if(!isInside(bars[m],bars[m+1]))continue;  // baby = the bar right after the mother\n    const mom=bars[m];\n    if(cls.dir==='bull'){\n      if(b.low<mom.low&&b.close>=mom.low)\n        return{d:'bull',lv:mom.low,lp:fsAtLP(bars,i,'bull',b.low)};\n    }else{\n      if(b.high>mom.high&&b.close<=mom.high)\n        return{d:'bear',lv:mom.high,lp:fsAtLP(bars,i,'bear',b.high)};\n    }\n  }\n  return{d:null,lv:null,lp:null};\n}\nfunction scan(bars){\n  const out=[];\n  for(let i=50;i<bars.length;i++){\n    const b=bars[i],cls=b.cls;\n    const flow=b.close>b.sma50?'up':'down';\n    const fRes=findForce(bars,i);const {f:force,lv}=fRes;\n    const eB=cls.dir==='bull'&&!cls.flush&&cls.type!=='neutral';\n    const eS=cls.dir==='bear'&&!cls.flush&&cls.type!=='neutral';\n    let label=null,dir=null,why=null,level=lv;\n    const fs=forceStrike(bars,i);\n    if(fs.d==='bull'){label='Bull-FS';dir='long';level=fs.lp!=null?fs.lp:fs.lv;\n      why=fs.lp!=null\n        ?`force-bottom scenario — strike bar pierced below LP ${fmt(fs.lp)} and closed back at/above it (standalone-tradeable per course)`\n        :'inside-bar trap — strike bar pierced below mother low and closed back inside (formation only, no LP involved)';}\n    else if(fs.d==='bear'){label='Bear-FS';dir='short';level=fs.lp!=null?fs.lp:fs.lv;\n      why=fs.lp!=null\n        ?`force-top scenario — strike bar pierced above LP ${fmt(fs.lp)} and closed back at/below it (standalone-tradeable per course)`\n        :'inside-bar trap — strike bar pierced above mother high and closed back inside (formation only, no LP involved)';}\n    else if(force==='bottom'&&eB){\n      // v0.19 — the \"1\" family is the SUPERSET, not a sibling. The deck (Lesson 19) gives DR1's\n      // flow as \"above &/or below 50 SMA\" and states DR2 is a SUBSET of DR1; v0.18 inverted that,\n      // making a majority flush a precondition for the whole reversal family, so a force bottom in\n      // DOWN flow with no majority flush had no reachable label at all and the scan went silent.\n      // (Real case: DXYZ weekly, Jul 2026 — live LP 23.81, bullish ice-cream EXE reclaiming it,\n      // down flow: a textbook DR1 that fell off the end of the tree.)\n      //\n      // v0.19 tree: the approach leg still decides FAMILY, but only where the two families actually\n      // compete — up flow, where a force bottom could be either a UC retracement or a DR reversal.\n      // A minority pullback in up flow -> continuation (deck gates as before; gates failing stays\n      // silent, since with no majority down move there is nothing for a reversal to reverse).\n      // EVERYTHING ELSE that is a genuine force bottom with a bullish EXE at a live LP is at least\n      // a DR1. DR2 is then the refined subset: down flow + majority flush MOVE + bigger retracement.\n      // EXE window remains 5 bars for both families (owner override of the reversal decks' 4).\n      const mf=majorityFlush(bars,i,fRes);\n      if(flow==='up'&&!mf.ok){                       // continuation family (UC) — the only contested case\n        const g=contGates(bars,i,'up');\n        if(g.ok){label=legsInPullback(bars,i,'up')>=2?'UC2':'UC1';dir='long';\n          why=`up flow · minority pullback forced ${fmt(lv)} · no flush-up into the origin · near/testing 20/50 SMA · bullish EXE reclaimed it early`;}\n      }else{                                         // reversal family (DR) — DR2 if it qualifies, else DR1\n        const br=(mf.ok&&flow==='down')?biggerRetracement(bars,i,fRes,mf.yExt):null;\n        if(br&&br.ok){label='DR2';dir='long';\n          why=`down flow · majority flush-down into ${fmt(lv)} (leg from ${fmt(mf.legStart)} ≥ 50% line ${fmt(mf.fifty)}) · retracement ${fmt(br.cur)} > prior ${fmt(br.prev)} · bullish EXE recovered the LP`;}\n        else if(br&&br.unmeasurable){label='DR2';dir='long';\n          why=`down flow · majority flush-down into ${fmt(lv)} (leg from ${fmt(mf.legStart)} ≥ 50% line ${fmt(mf.fifty)}) · prior retracement unmeasurable, bigger-retracement rule UNVERIFIED · bullish EXE recovered the LP`;}\n        else{label='DR1';dir='long';\n          const tier=mf.ok\n            ? (br?'majority flush-down present but the retracement is SMALLER than the prior one — DR1, not DR2'\n                 :`majority flush-down into the LP but flow is ${flow}, not down — DR1, not DR2 (verify the range by eye)`)\n            : 'no majority flush-down — the approach was a wave, so DR1 (the general reversal), not DR2';\n          why=`${flow} flow · force-bottom (bear trap) at ${fmt(lv)} · bullish EXE recovered it · ${tier}`;}\n      }\n    }\n    else if(force==='top'&&eS){\n      // v0.19 — exact mirror of the force-bottom tree above. UR1 is the superset (deck: flow\n      // \"above &/or below 50 SMA\"); UR2 is the subset needing up flow + majority flush + bigger\n      // retracement. A force top in UP flow with no majority flush was silent in v0.18; it is a UR1.\n      const mf=majorityFlush(bars,i,fRes);\n      if(flow==='down'&&!mf.ok){                     // continuation family (DC) — the only contested case\n        const g=contGates(bars,i,'down');\n        if(g.ok){label=legsInPullback(bars,i,'down')>=2?'DC2':'DC1';dir='short';\n          why=`down flow · minority bounce forced ${fmt(lv)} · no flush-down into the origin · near/testing 20/50 SMA · bearish EXE rejected it early`;}\n      }else{                                         // reversal family (UR) — UR2 if it qualifies, else UR1\n        const br=(mf.ok&&flow==='up')?biggerRetracement(bars,i,fRes,mf.yExt):null;\n        if(br&&br.ok){label='UR2';dir='short';\n          why=`up flow · majority flush-up into ${fmt(lv)} (leg from ${fmt(mf.legStart)} ≤ 50% line ${fmt(mf.fifty)}) · retracement ${fmt(br.cur)} > prior ${fmt(br.prev)} · bearish EXE rejected the LP`;}\n        else if(br&&br.unmeasurable){label='UR2';dir='short';\n          why=`up flow · majority flush-up into ${fmt(lv)} (leg from ${fmt(mf.legStart)} ≤ 50% line ${fmt(mf.fifty)}) · prior retracement unmeasurable, bigger-retracement rule UNVERIFIED · bearish EXE rejected the LP`;}\n        else{label='UR1';dir='short';\n          const tier=mf.ok\n            ? (br?'majority flush-up present but the retracement is SMALLER than the prior one — UR1, not UR2'\n                 :`majority flush-up into the LP but flow is ${flow}, not up — UR1, not UR2 (verify the range by eye)`)\n            : 'no majority flush-up — the approach was a wave, so UR1 (the general reversal), not UR2';\n          why=`${flow} flow · force-top (bull trap) at ${fmt(lv)} · bearish EXE rejected it · ${tier}`;}\n      }\n    }\n    if(label){\n      const last=out[out.length-1];\n      if(last&&last.label===label&&(i-last.i)<=3)continue;   // dedupe adjacent repeats\n      out.push({i,date:b.date,label,dir,why,price:b.close,level,exe:cls.type});\n    }\n  }\n  return out;\n}\n\n/* trade structuring for a given EXE bar + direction */\nfunction buildTrade(bars,trig){\n  const e=bars[trig.i],atrv=e.atr||0,rng=e.high-e.low,mid=e.low+rng/2,dir=trig.dir;\n  const px=bars[bars.length-1].close;\n  if(dir==='long'){\n    const entry=mid,sl=Math.min(e.low-0.01,e.high-atrv),risk=entry-sl;\n    return{dir,entryLo:mid,entryHi:e.high,sl,risk,tgt:entry+1.7*risk,wide:risk>atrv,atr:atrv,smelly:(px-entry)>=risk};\n  }\n  const entry=mid,sl=Math.max(e.high+0.01,e.low+atrv),risk=sl-entry;\n  return{dir,entryLo:e.low,entryHi:mid,sl,risk,tgt:entry-1.7*risk,wide:risk>atrv,atr:atrv,smelly:(entry-px)>=risk};\n}\n\n/* worksheet read for the latest bar */\nfunction analyse(bars){\n  const last=bars[bars.length-1],px=last.close;\n  const flow=last.sma50==null?'unknown':(px>last.sma50?'up':'down');\n  const r=bars.slice(-6);\n  const flushUp=r.filter(b=>b.cls.type==='FLUSH-UP').length, flushDn=r.filter(b=>b.cls.type==='FLUSH-DOWN').length;\n  // nearest LP above/below — same full-history, un-breached level lists the scan uses\n  const li=bars.length-1, aliveLP=e=>e.j<li-2&&e.breach===null;\n  const sh=(bars.lpHighs||[]).filter(aliveLP).map(e=>e.lv), sl=(bars.lpLows||[]).filter(aliveLP).map(e=>e.lv);\n  const lpAbove=sh.filter(v=>v>px).sort((a,b)=>a-b)[0]||null, lpBelow=sl.filter(v=>v<px).sort((a,b)=>b-a)[0]||null;\n  const {f:force,lv:forceLevel}=findForce(bars,bars.length-1);\n  return{last,px,flow,flushUp,flushDn,lpAbove,lpBelow,force,forceLevel,near20:last.sma20,near50:last.sma50,atr:last.atr};\n}\n\n/* ============================================================\n   STATE + RENDER\n   ============================================================ */\nconst S={src:'NVDA',tf:'2',lens:1,ticker:PAM_DATA.ticker,name:(PAM_DATA.name||''),effMonths:36,\n  layers:{pam:true,sma:true,channels:false,turtle:false,reverse:false}, recentOnly:false,\n  ind:{stoch:false,rsi:false,macd:false,atr:false}, span:null, start:null};\nconst THEMES={dark:{grid:'#1b232c',chipBg:'#10161d',zero:'#2a3550'},light:{grid:'#e7e1d4',chipBg:'#fffdf9',zero:'#ded7ca'}};\nlet THEME='dark'; try{THEME=localStorage.getItem('pam_theme')||'dark';}catch(e){}\nlet TH=THEMES[THEME]||THEMES.dark;\ntry{document.documentElement.setAttribute('data-theme',THEME);}catch(e){}\nfunction applyTheme(t){THEME=(t==='light')?'light':'dark';TH=THEMES[THEME];\n  try{document.documentElement.setAttribute('data-theme',THEME);}catch(e){}\n  try{localStorage.setItem('pam_theme',THEME);}catch(e){}\n  const tb=document.getElementById('themeToggle'); if(tb)tb.textContent=THEME==='light'?'◐ Dark':'◐ Light';\n  if(typeof draw==='function' && typeof BARS!=='undefined' && BARS && BARS.length) draw();}\nlet BARS=[],A=null,TRIGS=[],ACTIVE=null,TRADE=null;\nconst $=s=>document.querySelector(s);\nfunction fmt(x,d=2){return x==null?'—':Number(x).toFixed(d);}\nfunction tfLabel(){return S.tf==='W'?'WEEKLY · 3-YEAR':S.tf==='2'?'2-DAY · 1-YEAR':'DAILY';}\nfunction sourceBars(){\n  if(S.src==='PASTE')return enrich(aggregate(S.paste, S.tf==='2'?2:1));\n  if(S.tf==='W' && NVDA_WEEKLY) return enrich(aggregate(NVDA_WEEKLY,1));\n  const n = (S.tf==='2' || (S.tf==='W' && !NVDA_WEEKLY)) ? 2 : 1;  // weekly missing -> fall back to 2-Day\n  return enrich(aggregate(NVDA_DAILY,n));\n}\nfunction recompute(){\n  BARS=sourceBars(); A=analyse(BARS); TRIGS=scan(BARS);\n  const def=S.tf==='W'?156:90; S.span=Math.min(def,BARS.length); S.start=Math.max(0,BARS.length-S.span);  // reset view to newest\n  // active = a trigger on the last or 2nd-last bar\n  ACTIVE=TRIGS.filter(t=>t.i>=BARS.length-2).slice(-1)[0]||null;\n  TRADE=ACTIVE?buildTrade(BARS,ACTIVE):null;\n  renderVerdict();renderSteps();renderTrade();renderLog();draw();\n}\n\nfunction renderVerdict(){\n  $('#vTk').textContent=`${S.ticker} · ${tfLabel()}`;\n  const _nm=$('#vNm'); if(_nm)_nm.textContent=S.name||'';\n  $('#vPx').textContent=fmt(A.px);\n  const c=[];\n  c.push(`<span class=\"chip ${A.flow==='up'?'long':A.flow==='down'?'short':''}\">flow ${A.flow}<\u002Fspan>`);\n  if(A.flushUp)c.push(`<span class=\"chip short\">${A.flushUp} flush-up<\u002Fspan>`);\n  if(A.flushDn)c.push(`<span class=\"chip long\">${A.flushDn} flush-down<\u002Fspan>`);\n  if(ACTIVE)c.push(`<span class=\"chip ${ACTIVE.dir==='long'?'long':'short'}\">▶ ${ACTIVE.label} active<\u002Fspan>`);\n  else c.push(`<span class=\"chip\">no active trigger<\u002Fspan>`);\n  $('#vChips').innerHTML=c.join('');\n  if(typeof chartOptSync==='function')chartOptSync();\n  if(typeof chartWlSync==='function')chartWlSync();\n}\n\nfunction renderSteps(){\n  const a=A;\n  const flushNote=a.flushUp?`${a.flushUp} flush-up bar(s) recently — <b>bearish<\u002Fb> to the trader`\n    :a.flushDn?`${a.flushDn} flush-down bar(s) recently — <b>bullish<\u002Fb> to the trader`:'wave-like, no recent flush bars';\n  const setupTxt=ACTIVE?`<b>${ACTIVE.label}<\u002Fb> <span class=\"tag ${ACTIVE.dir==='long'?'long':'short'}\">${ACTIVE.dir}<\u002Fspan> — ${ACTIVE.why}.`\n    :(TRIGS.length?`No trigger on the latest bar. Most recent was <b>${TRIGS[TRIGS.length-1].label}<\u002Fb> on ${TRIGS[TRIGS.length-1].date}.`:'No triggers found in this window.');\n  const steps=[\n    ['1','Flow (50 SMA)',`Price ${fmt(a.px)} is <b>${a.flow==='up'?'above':'below'}<\u002Fb> the 50 SMA (${fmt(a.near50)}) → <b>${a.flow} flow<\u002Fb>. 20 SMA ${fmt(a.near20)}.`],\n    ['2','Momentum',flushNote+'.'],\n    ['3','LP levels',`Nearest un-breached swing levels — above <b>${fmt(a.lpAbove)}<\u002Fb>, below <b>${fmt(a.lpBelow)}<\u002Fb>.`],\n    ['4','Force scenario',a.force?`A force <b>${a.force}<\u002Fb> at ${fmt(a.forceLevel)} is in play on the latest bar — a ${a.force==='top'?'bull trap (bearish)':'bear trap (bullish)'}.`:'No force top/bottom on the latest bar.'],\n    ['5','Latest EXE',`${a.last.cls.type}${a.last.cls.flush?' (flush)':''}, ${a.last.cls.dir||'neutral'} on ${a.last.date}.`],\n    ['6','Setup',setupTxt],\n    ['7','Trade structure',TRADE?`Structured at right from the ${ACTIVE.label} bar — entry, stop, width vs ATR, 1:1.7 target.`:'No live structure — the framework waits for the latest bar to be a trigger.'],\n    ['8','Exit watch',ACTIVE&&ACTIVE.dir==='long'?`If long: ≥2 flush-up bars, a flush into ${fmt(a.lpAbove)}, or a force-top forming → size out 40–60%.`\n      :ACTIVE&&ACTIVE.dir==='short'?`If short: ≥2 flush-down bars, a flush into ${fmt(a.lpBelow)}, or a force-bottom forming → cover 40–60%.`\n      :`In any trade: ≥2 flush bars against you, or a flush into the next LP, is the cue to scale out.`],\n  ];\n  $('#steps').innerHTML=steps.map(([n,k,v])=>`<div class=\"step\"><div class=\"n\">${n}<\u002Fdiv><div><div class=\"k\">${k}<\u002Fdiv><div class=\"v\">${v}<\u002Fdiv><\u002Fdiv><\u002Fdiv>`).join('');\n  $('#caveat').textContent='This is the PAM framework’s reading of the chart, not a forecast. Setups fail; it is one methodology among many and is not financial advice. Sizing and risk are your call.';\n}\n\nfunction renderTrade(){\n  const t=TRADE;\n  if(!t){$('#trade').innerHTML=`<div class=\"note\">No trade structured — the latest bar isn’t a trigger. The log below shows the most recent ones and the reason each fired, so you can see what the chart is reacting to.<\u002Fdiv>`;return;}\n  const width=t.wide?`<span class=\"pill no\">WIDE — tighten entry/stop<\u002Fspan>`:`<span class=\"pill ok\">NOT WIDE — within 1 ATR<\u002Fspan>`;\n  const smelly=t.smelly?`<div class=\"note\">⚠ Smelly trade: price has already run ≥1R from the planned entry — the framework would <b>cancel<\u002Fb> the order; the edge is gone.<\u002Fdiv>`:'';\n  $('#trade').innerHTML=`<table>\n    <tr><td>Trigger<\u002Ftd><td>${ACTIVE.label} <span class=\"tag ${t.dir==='long'?'long':'short'}\">${t.dir}<\u002Fspan><\u002Ftd><\u002Ftr>\n    <tr><td>Sweet-spot entry<\u002Ftd><td>${fmt(Math.min(t.entryLo,t.entryHi))} – ${fmt(Math.max(t.entryLo,t.entryHi))}<\u002Ftd><\u002Ftr>\n    <tr><td>Stop loss<\u002Ftd><td>${fmt(t.sl)}<\u002Ftd><\u002Ftr>\n    <tr><td>Risk (entry→SL)<\u002Ftd><td>${fmt(t.risk)}<\u002Ftd><\u002Ftr>\n    <tr><td>Current ATR(14)<\u002Ftd><td>${fmt(t.atr)}<\u002Ftd><\u002Ftr>\n    <tr><td>Width check<\u002Ftd><td>${width}<\u002Ftd><\u002Ftr>\n    <tr><td>Target (1 : 1.7)<\u002Ftd><td>${fmt(t.tgt)}<\u002Ftd><\u002Ftr><\u002Ftable>${smelly}`;\n}\n\nfunction renderLog(){\n  if(!TRIGS.length){$('#log').innerHTML=`<div class=\"empty\">No triggers in this window — the framework is sitting out.<\u002Fdiv>`;return;}\n  const rows=TRIGS.slice().reverse().slice(0,10).map(t=>{\n    const cl=t.dir==='long'?'long':'short';\n    return `<div class=\"logrow\"><div class=\"dt\">${t.date}<\u002Fdiv><div class=\"lab ${cl}\">${t.label}<\u002Fdiv><div class=\"why\">${t.why}.<\u002Fdiv><\u002Fdiv>`;\n  });\n  $('#log').innerHTML=rows.join('');\n}\n\n/* ---------- chart ---------- */\nconst cv=$('#chart'),ctx=cv.getContext('2d');let GEO=null;\nconst ov=$('#chartOverlay'),octx=ov&&ov.getContext('2d');\nconst MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n/* ============================================================\n   EFFECTIVENESS — score every historical PAM / Turtle signal on\n   DAILY bars, to a rule-based exit, over a 1–5y window.\n   The full daily series is enriched + scanned ONCE (buildEff);\n   the slider only re-slices by date — no new download.\n   ============================================================ */\nlet EFF=null;   // { bars, trigs }  cached daily analysis\nlet EFF_OPEN={};   // which system groups are expanded { 'PAM long':true, ... }\nfunction effDailyBars(){\n  if(S.src==='PASTE' && S.paste) return enrich(aggregate(S.paste,1));\n  return enrich(aggregate(NVDA_DAILY,1));\n}\nfunction buildEff(){ try{ const bars=effDailyBars(); EFF={bars,trigs:scan(bars)}; }catch(e){ EFF=null; } }\nconst EFF_WINDOWS=[3,6,12,24,36,48,60];   // selectable look-back windows, in MONTHS\nfunction effLabel(m){ return m<12?(m+' months'):((m/12)+(m/12===1?' year':' years')); }\nfunction effCutoff(months){ const last=EFF.bars[EFF.bars.length-1].date;\n  const d=new Date(last); if(isNaN(d)){return '0000-01-01';} d.setMonth(d.getMonth()-months);\n  return d.toISOString().slice(0,10); }\n// one PAM trigger -> {r, ex}: fractional P&L of a 1:1.7 trade risking 1 ATR from the trigger close, + exit bar index\nfunction simPam(bars,t){\n  const e=bars[t.i],atrv=e.atr; if(!atrv||atrv<=0)return null;\n  const entry=e.close,R=atrv,long=t.dir==='long';\n  const tgt=long?entry+1.7*R:entry-1.7*R, stop=long?entry-R:entry+R;\n  const cap=Math.min(bars.length-1,t.i+40);\n  for(let j=t.i+1;j<=cap;j++){const b=bars[j];\n    if(long){ if(b.low<=stop)return{r:(stop-entry)/entry,ex:j,open:false}; if(b.high>=tgt)return{r:(tgt-entry)/entry,ex:j,open:false}; }\n    else    { if(b.high>=stop)return{r:(entry-stop)/entry,ex:j,open:false}; if(b.low<=tgt)return{r:(entry-tgt)/entry,ex:j,open:false}; } }\n  const c=bars[cap].close, open=(cap===bars.length-1);   // ran to the last bar with no exit -> still open, marked at latest close\n  return{r:long?(c-entry)/entry:(entry-c)/entry,ex:cap,open};\n}\n// realise a sleeve as ONE account: take trades in entry order, skip any that open before the prior one closed,\n// then COMPOUND. Turtle/Reverse trades are already non-overlapping; PAM triggers can overlap, so this de-overlaps them.\n// Open positions (still running) are marked to the latest close and counted, with a flag.\n// -> {n: trades taken, win, avg (per trade), total (cumulative, compounded — comparable to buy & hold), open: # unrealised}\nfunction seqStats(trades){\n  trades.sort((a,b)=>a.entry-b.entry);\n  const taken=[]; let lastExit=-1;\n  for(const tr of trades){ if(tr.r==null)continue; if(tr.entry>lastExit){ taken.push(tr); lastExit=tr.exit; } }\n  const n=taken.length; if(!n)return{n:0,win:null,avg:null,total:null,open:0};\n  const rs=taken.map(t=>t.r), wins=rs.filter(x=>x>0).length, avg=rs.reduce((a,b)=>a+b,0)/n;\n  const openN=taken.filter(t=>t.open).length;\n  let eq=1; rs.forEach(x=>eq*=(1+Math.max(-0.99,x)));     // compounded equity, one position at a time\n  return{n,win:wins/n,avg,total:eq-1,open:openN};\n}\nfunction effStatus(s){ if(!s||s.n===0)return{cls:'eff-none',word:'no trades'};\n  if(s.avg<=0)return{cls:'eff-bad',word:'negative'};\n  if(s.n>=8&&s.win>=0.55)return{cls:'eff-robust',word:'robust'};\n  if(s.n>=5)return{cls:'eff-green',word:'positive'};\n  return{cls:'eff-thin',word:'too few (N<5)'}; }\nfunction computeEff(months){\n  const bars=EFF.bars,trigs=EFF.trigs,cut=effCutoff(months),inWin=d=>d>=cut,lastIdx=bars.length-1;\n  // PAM trades matching a predicate (label/dir), each via simPam (open flag preserved)\n  const pamBy=pred=>{const out=[];trigs.forEach(t=>{if(!inWin(t.date)||!pred(t))return;const o=simPam(bars,t);if(!o)return;out.push({entry:t.i,exit:o.ex,r:o.r,open:o.open});});return out;};\n  // Turtle/Reverse trades from an array, optional sys filter (0 = all), open trades marked to latest close\n  const ttBy=(arr,long,sys)=>{const out=[];(arr||[]).forEach(tr=>{if(!inWin(bars[tr.entry].date))return;if(sys&&tr.sys!==sys)return;const en=bars[tr.entry].close,op=tr.exit==null,exI=op?lastIdx:tr.exit,exC=bars[exI].close;out.push({entry:tr.entry,exit:exI,r:long?(exC-en)/en:(en-exC)/en,open:op});});return out;};\n  const lbl=(...ls)=>{const set=new Set(ls);return t=>set.has(t.label);};\n  const rows=[\n    {k:'PAM long',s:seqStats(pamBy(t=>t.dir==='long')),kids:[\n      {k:'Bull-FS',s:seqStats(pamBy(lbl('Bull-FS')))},\n      {k:'UC1 / UC2',s:seqStats(pamBy(lbl('UC1','UC2')))},\n      {k:'DR1 / DR2',s:seqStats(pamBy(lbl('DR1','DR2')))}]},\n    {k:'PAM short',s:seqStats(pamBy(t=>t.dir==='short')),kids:[\n      {k:'Bear-FS',s:seqStats(pamBy(lbl('Bear-FS')))},\n      {k:'DC1 / DC2',s:seqStats(pamBy(lbl('DC1','DC2')))},\n      {k:'UR1 / UR2',s:seqStats(pamBy(lbl('UR1','UR2')))}]},\n    {k:'Turtle S1/S2 long',s:seqStats(ttBy(bars.ttTrades,true,0)),kids:[\n      {k:'S1 · 20-day',s:seqStats(ttBy(bars.ttTrades,true,1))},\n      {k:'S2 · 55-day',s:seqStats(ttBy(bars.ttTrades,true,2))}]},\n    {k:'Reverse-TT short',s:seqStats(ttBy(bars.rtTrades,false,0)),kids:[\n      {k:'S1s · 20-day',s:seqStats(ttBy(bars.rtTrades,false,1))},\n      {k:'S2s · 55-day',s:seqStats(ttBy(bars.rtTrades,false,2))}]}\n  ];\n  let bh=null,start=null;\n  for(let i=0;i<bars.length;i++){ if(inWin(bars[i].date)){start=bars[i].date;bh=(bars[lastIdx].close-bars[i].close)/bars[i].close;break;} }\n  return{rows,bh,start,last:bars[lastIdx].date,bars:bars.length}; }\nfunction effPct(x,d){ return x==null?'—':((x*100).toFixed(d==null?1:d)+'%'); }\nfunction renderEffectiveness(){\n  const body=$('#effBody'),lbl=$('#effYearsLbl'),note=$('#effNote'),nm=$('#effName'); if(!body)return;\n  if(nm)nm.textContent = S.name?('· '+S.name):(S.ticker?('· '+S.ticker):'');\n  const m=S.effMonths||36; if(lbl)lbl.textContent=effLabel(m);\n  if(!EFF||!EFF.bars||EFF.bars.length<60){\n    body.innerHTML='<div class=\"empty\">Not enough daily history to score yet (need ~60+ bars). Fetch a symbol with your key, or paste a longer series.<\u002Fdiv>';\n    if(note)note.textContent=''; return; }\n  const e=computeEff(m);\n  const cells=s=>{const st=effStatus(s),a=s.avg,tt=s.total;\n    return `<td class=\"num\">${s.n||0}${s.open?` <span class=\"opn\">(${s.open} open)<\u002Fspan>`:''}<\u002Ftd>`+\n      `<td class=\"num\">${s.win==null?'—':effPct(s.win,0)}<\u002Ftd>`+\n      `<td class=\"num avgcol ${a==null?'':a>0?'pos':'neg'}\">${effPct(a)}<\u002Ftd>`+\n      `<td class=\"num ${tt==null?'':tt>0?'pos':'neg'}\">${effPct(tt)}<\u002Ftd>`+\n      `<td><span class=\"effword ${st.cls}\">${st.word}<\u002Fspan><\u002Ftd>`;};\n  const parent=r=>`<tr data-grp=\"${r.k}\" class=\"eff-grp\"><td><span class=\"eff-disc\">${EFF_OPEN[r.k]?'▾':'▸'}<\u002Fspan><span class=\"effpill ${effStatus(r.s).cls}\">${r.k}<\u002Fspan>${(r.kids&&r.kids.length)?`<span class=\"eff-cnt\">${EFF_OPEN[r.k]?'hide':r.kids.length+' setups'}<\u002Fspan>`:''}<\u002Ftd>${cells(r.s)}<\u002Ftr>`;\n  const kid=k=>`<tr class=\"eff-kid\"><td><span class=\"eff-sub\">${k.k}<\u002Fspan><\u002Ftd>${cells(k.s)}<\u002Ftr>`;\n  body.innerHTML=`<table class=\"eff\">`+\n    `<tr><th>System<\u002Fth><th class=\"num\">N<\u002Fth><th class=\"num\">Win%<\u002Fth><th class=\"num avgcol\">Avg/trade<\u002Fth><th class=\"num\">Total<\u002Fth><th>Read<\u002Fth><\u002Ftr>`+\n    e.rows.map(r=>parent(r)+((r.kids&&EFF_OPEN[r.k])?r.kids.map(kid).join(''):'')).join('')+\n    `<tr class=\"bh\"><td><span class=\"effpill eff-bh\">Buy &amp; hold<\u002Fspan><\u002Ftd><td class=\"num\">—<\u002Ftd><td class=\"num\">—<\u002Ftd><td class=\"num avgcol\">—<\u002Ftd>`+\n    `<td class=\"num ${e.bh==null?'':e.bh>0?'pos':'neg'}\">${effPct(e.bh)}<\u002Ftd><td><span class=\"effword eff-none\">benchmark<\u002Fspan><\u002Ftd><\u002Ftr>`+\n    `<\u002Ftable>`;\n  body.onclick=ev=>{const tr=ev.target.closest&&ev.target.closest('tr[data-grp]');if(!tr)return;const k=tr.getAttribute('data-grp');EFF_OPEN[k]=!EFF_OPEN[k];renderEffectiveness();setTimeout(()=>{if(typeof saveLocal==='function')saveLocal();},0);};\n  const exb=$('#effExpand'); if(exb){const groups=e.rows.filter(r=>r.kids&&r.kids.length).map(r=>r.k);const allOpen=groups.length&&groups.every(k=>EFF_OPEN[k]);exb.textContent=allOpen?'Collapse all':'Expand all';exb.onclick=()=>{const open=!allOpen;groups.forEach(k=>EFF_OPEN[k]=open);renderEffectiveness();setTimeout(()=>{if(typeof saveLocal==='function')saveLocal();},0);};}\n  if(note)note.innerHTML=`Window: <b>${e.start||'—'} → ${e.last}<\u002Fb> · ${e.bars} daily bars pulled (the slider re-slices this same pull — no new download). `+\n    `<b>Avg/trade<\u002Fb> is the mean of a single trade, so it will always look tiny beside a multi-year cumulative — that's why \"0.6% vs 201%\" was never a fair comparison. `+\n    `<b>Total<\u002Fb> is the like-for-like figure: each sleeve <b>compounded, trading one position at a time<\u002Fb>, set against <b>Buy &amp; hold<\u002Fb> over the same window. `+\n    `N is now trades actually taken (overlapping signals are skipped, since you can't hold two at once). Tap a system row to expand it into its individual triggers; a group de-overlaps across all of them, so its N will not equal the sum of the rows beneath. `+\n    `A position still running is <b>included and marked at the latest price<\u002Fb> — shown as <b>(n open)<\u002Fb> — so a winner you're still riding finally counts; being unrealised, its mark can still reverse before the trade closes. `+\n    `PAM = a 1:1.7 trade risking 1&nbsp;ATR from the trigger close; Turtle/Reverse = its own entry→exit. No costs modelled. `+\n    `<b>Read<\u002Fb> = per-trade edge (robust = N≥8, Win≥55%). Small N isn't signal; setups fail; educational only.`;\n}\nfunction fmtAxis(d,withYear){const m=String(d).split('-');if(m.length<3)return d;\n  return withYear?(MON[+m[1]-1]+' ’'+m[0].slice(2)):(m[  }\n\n  // active trade overlay (only when the latest bar is in view)\n  if(S.lens&&S.layers.pam&&TRADE&&(i0+n>=BARS.length)){const t=TRADE,x1=W-padR;const xr0=x(view.length-1)-cw*1.5;\n    ctx.fillStyle='#5fb89e';ctx.globalAlpha=.15;ctx.fillRect(xr0,y(Math.max(t.entryLo,t.entryHi)),x1-xr0,Math.abs(y(t.entryLo)-y(t.entryHi)));ctx.globalAlpha=1;\n    [['#cf7a64',t.sl],['#6f7fa6',t.tgt]].forEach(([c,lv])=>{if(lv>hi||lv<lo)return;\n      ctx.strokeStyle=c;ctx.setLineDash([4,3]);ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(xr0,y(lv));ctx.lineTo(x1,y(lv));ctx.stroke();ctx.setLineDash([]);});\n  }\n  // ===== indicator sub-panels (share the x-axis; date gridlines already drawn behind) =====\n  function pY(p,v,vmin,vmax){return p.top+(vmax-v)/(vmax-vmin)*(p.bot-p.top);}\n  function pPoly(p,key,col,w,vmin,vmax){ctx.strokeStyle=col;ctx.lineWidth=w;ctx.beginPath();let st=false;\n    view.forEach(b=>{const v=b[key];if(v==null)return;const px=x(b.i-i0),py=pY(p,v,vmin,vmax);if(st)ctx.lineTo(px,py);else ctx.moveTo(px,py);st=true;});ctx.stroke();}\n  function pGuide(p,v,vmin,vmax,col,txt,dash){const py=pY(p,v,vmin,vmax);\n    ctx.strokeStyle=col;ctx.setLineDash(dash||[4,3]);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(padL,py);ctx.lineTo(W-padR,py);ctx.stroke();ctx.setLineDash([]);\n    if(txt){ctx.fillStyle='#8190a8';ctx.textAlign='left';ctx.fillText(txt,W-padR+6,py);}}\n  function pScale(p,top,bot){ctx.fillStyle='#5b667e';ctx.textAlign='left';\n    ctx.fillText(top,W-padR+6,p.top+7);ctx.fillText(bot,W-padR+6,p.bot-7);}\n  inds.forEach(p=>{\n    ctx.strokeStyle=TH.grid;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(padL,p.top-panelGap/2);ctx.lineTo(W-padR,p.top-panelGap/2);ctx.stroke();\n    ctx.fillStyle='#8895ad';ctx.font='10px IBM Plex Mono';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText(p.label,padL+2,p.top+1);ctx.textBaseline='middle';\n    if(p.key==='stoch'){\n      const y80=pY(p,80,0,100), y20=pY(p,20,0,100);\n      ctx.fillStyle='rgba(207,122,100,0.06)';ctx.fillRect epainted while the pointer\n   moves — that keeps scrubbing smooth. Point anywhere and you read\n   the EXACT price at the pointer's height (right axis) and the date\n   of the bar the vertical line snaps to (bottom axis). Works with the\n   mouse on desktop and with a press-and-hold on mobile.\n   ============================================================ */\nfunction syncOverlay(){                    // keep the overlay locked onto the chart's exact size/position\n  if(!ov||!octx)return;\n  const dpr=window.devicePixelRatio||1;\n  ov.style.left=cv.offsetLeft+'px'; ov.style.top=cv.offsetTop+'px';\n  ov.style.width=cv.clientWidth+'px'; ov.style.height=cv.clientHeight+'px';\n  ov.width=Math.max(1,Math.round(cv.clientWidth*dpr));\n  ov.height=Math.max(1,Math.round(cv.clientHeight*dpr));\n  octx.setTransform(dpr,0,0,dpr,0,0);      // draw in CSS pixels, same as the base chart\n}\nfunction clearXhair(){ if(ov&&octx) octx.clearRect(0,0,ov.clientWidth,ov.clientHeight); }\nfunction xhColors(){ return THEME==='light'\n  ? {line:'#9b8f74',fill:'#4a4636',txt:'#fdfbf6'}\n  : {line:'#6178a0',fill:'#213047',txt:'#eaf0fb'}; }\nfunction xhDate(d){const m=String(d).split('-'); return m.length<3?String(d):(m[2]+' '+MON[+m[1]-1]+' '+m[0]);}\nfunction xhPrice(p){const a=Math.abs(p); return a>=1000?p.toFixed(1):a>=1?p.toFixed(2):p.toFixed(4);}\nfunction xhPill(cx,cy,text,C){             // a small filled axis label centred on (cx,cy)\n  octx.font='600 10px IBM Plex Mono'; octx.textBaseline='middle'; octx.textAlign='center';\n  const w=octx.measureText(text).width+10, h=15;\n  octx.globalAlpha=1; octx.fillStyle=C.fill; octx.fillRect(cx-w/2,cy-h/2,w,h);\n  octx.strokeStyle=C.line; octx.lineWidth=1; octx.strokeRect(cx-w/2+0.5,cy-h/2+0.5,w-1,h-1);\n  octx.fillStyle=C.txt; octx.fillText(text,cx,cy+0.5);\n}\nfunction showTip(b,mx,my,rWidth,isTouch){   // rich OHLC card (shared by mouse + touch); mx,my = pointer in chart CSS px\n  if(!b)return;\n  const trig=TRIGS.find(t=>t.i===b.i);\n  const dirw=b.cls.dir==='bull'?'<span style=\"color:var(--long)\">bullish<\u002Fspan>':b.cls.dir==='bear'?'<span style=\"color:var(--short)\">bearish<\u002Fspan>':'neutral';\n  const ib=[];\n  if(S.ind.stoch&&b.stochK!=null)ib.push('Stoch '+b.stochK.toFixed(0)+'/'+(b.stochD!=null?b.stochD.toFixed(0):'–'));\n  if(S.ind.rsi&&b.rsi!=null)ib.push('RSI '+b.rsi.toFixed(0));\n  if(S.ind.macd&&b.macd!=null)ib.push('MACD '+b.macd.toFixed(2));\n  if(S.ind.atr&&b.atrW!=null)ib.push('ATR '+b.atrW.toFixed(2));\n  const indLine=ib.length?`<div class=\"cls\" style=\"color:#8895ad\">${ib.join(' · ')}<\u002Fdiv>`:'';\n  tip.innerHTML=`<div class=\"d\">${b.date}<\u002Fdiv>\n    <div class=\"row\"><span>O<\u002Fspan><b>${fmt(b.open)}<\u002Fb><\u002Fdiv><div class=\"row\"><span>H<\u002Fspan><b>${fmt(b.high)}<\u002Fb><\u002Fdiv>\n    <div class=\"row\"><span>L<\u002Fspan><b>${fmt(b.low)}<\u002Fb><\u002Fdiv><div class=\"row\"><span>C<\u002Fspan><b>${fmt(b.close)}<\u002Fb><\u002Fdiv>\n    <div class=\"cls\"><span style=\"color:var(--force)\">${b.cls.type}<\u002Fspan> · ${dirw}${b.cls.flush?' · <span style=\"color:var(--force)\">flush<\u002Fspan>':''}${trig?` · <b style=\"color:${trig.dir==='long'?'var(--long)':'var(--short)'}\">${trig.label} trigger<\u002Fb>`:''}<\u002Fdiv>${indLine}`;\n  tip.style.opacity=1;                                          // show first so offsetWidth/offsetHeight read its real size\n  const ox=cv.offsetLeft, oy=cv.offsetTop, chartH=cv.clientHeight;\n  const tw=tip.offsetWidth||196, th=tip.offsetHeight||120;\n  const gapX=16, gapY=isTouch?26:16;                            // touch needs more gap so the fingertip never covers the card\n  // horizontal: follow the pointer on its RIGHT; the moment the box would spill past the right edge\n  //   (i.e. start covering the right-side candles) flip it to the LEFT of the pointer, then clamp on-chart\n  let lx=ox+mx+gapX;\n  if(lx+tw>ox+rWidth-6) lx=ox+mx-gapX-tw;\n  lx=Math.max(ox+6,Math.min(lx,ox+rWidth-tw-6));\n  // vertical: mouse sits just BELOW the pointer (flips above near the bottom);\n  //   touch sits ABOVE the fingertip (flips below near the top) so your finger never covers it\n  let ty;\n  if(isTouch){ ty=oy+my-gapY-th; if(ty<oy+6) ty=oy+my+gapY; }\n  else       { ty=oy+my+gapY;    if(ty+th>oy+chartH-6) ty=oy+my-gapY-th; }\n  ty=Math.max(oy+6,Math.min(ty,oy+chartH-th-6));\n  tip.style.left=lx+'px'; tip.style.top=ty+'px';\n}\nfunction renderXhair(mx,my,isTouch,rWidth){   // mx,my = CSS px relative to the chart's top-left\n  if(!GEO||!ov||!octx)return;\n  const g=GEO;\n  if(mx<0||mx>g.W||my<0||my>g.H){ clearXhair(); tip.style.opacity=0; return; }\n  let best=g.view[0],bd=1e9;                    // snap the vertical line to the nearest candle (dates are discrete)\n  for(const b of g.view){const d=Math.abs(g.x(b.i-g.i0)-mx); if(d<bd){bd=d;best=b;}}\n  const bx=g.x(best.i-g.i0);\n  const inPrice=my>=g.priceTop&&my<=g.priceBot;  // a \"price\" only means something inside the price panel\n  const C=xhColors();\n  clearXhair();\n  octx.save();\n  octx.lineWidth=1; octx.setLineDash([4,4]); octx.strokeStyle=C.line; octx.globalAlpha=.9;\n  octx.beginPath(); octx.moveTo(bx,g.priceTop); octx.lineTo(bx,g.chartBot); octx.stroke();   // vertical — spans every panel\n  if(inPrice){ octx.beginPath(); octx.moveTo(g.padL,my); octx.lineTo(g.W-g.padR,my); octx.stroke(); } // horizontal — price panel only\n  octx.setLineDash([]); octx.globalAlpha=1;\n  if(inPrice){                                    // exact price pill on the right axis\n    const price=g.hi-(my-g.priceTop)/g.priceH*(g.hi-g.lo);\n    const py=Math.max(g.priceTop+8,Math.min(g.priceBot-8,my));\n    octx.textAlign='left'; octx.textBaseline='middle'; octx.font='600 10px IBM Plex Mono';\n    const t=xhPrice(price), w=octx.measureText(t).width+10, h=15, px=g.W-g.padR+3;\n    octx.fillStyle=C.fill; octx.fillRect(px,py-h/2,w,h);\n    octx.strokeStyle=C.line; octx.lineWidth=1; octx.strokeRect(px+0.5,py-h/2+0.5,w-1,h-1);\n    octx.fillStyle=C.txt; octx.fillText(t,px+5,py+0.5);\n  }\n  { const dx=Math.max(g.padL+2,Math.min(g.W-g.padR-2,bx)); xhPill(dx,g.chartBot+11,xhDate(best.date),C); } // date pill on the bottom axis\n  octx.restore();\n  showTip(best,mx,my,rWidth,isTouch);\n}\n\n/* hover tooltip + horizontal pan/zoom */\nconst tip=$('#tip');\nlet drag=null;\nfunction clampStart(s){return Math.max(0,Math.min((BARS.length||1)-(S.span||1), s));}\ncv.style.cursor='grab';\ncv.addEventListener('mousedown',e=>{drag={x:e.clientX,start:S.start};cv.style.cursor='grabbing';tip.style.opacity=0;});\nwindow.addEventListener('mouseup',()=>{if(drag){drag=null;cv.style.cursor='grab';}});\ncv.addEventListener('wheel',e=>{if(!BARS.length)return;e.preventDefault();const fullN=BARS.length;\n  if(e.shiftKey||e.ctrlKey||e.metaKey){const right=S.start+S.span;let span=Math.round(S.span*(e.deltaY>0?1.18:0.85));\n    span=Math.max(12,Math.min(fullN,span));S.span=span;S.start=clampStart(right-span);}\n  else{const step=Math.max(1,Math.round(S.span*0.12))*(((e.deltaX||e.deltaY)>0)?1:-1);S.start=clampStart(S.start+step);}\n  draw();},{passive:false});\n$('#scroll').addEventListener('input',e=>{S.start=clampStart(+e.target.value);draw();});\n$('#fitAll').onclick=()=>{S.span=BARS.length;S.start=0;draw();};\nfunction zoomBy(f){const fullN=BARS.length,right=S.start+S.span;let span=Math.round(S.span*f);span=Math.max(12,Math.min(fullN,span));S.span=span;S.start=clampStart(right-span);draw();}\n$('#zIn').onclick=()=>zoomBy(0.8); $('#zOut').onclick=()=>zoomBy(1.25);\n/* ---- touch: 1-finger horizontal pan, 2-finger pinch zoom (vertical swipe scrolls the page) ---- */\nlet touch=null,lpTimer=null,touchXhair=false;\nfunction tdist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}\nfunction clearLP(){ if(lpTimer){clearTimeout(lpTimer);lpTimer=null;} }\nfunction enterXhair(clientX,clientY){        // press-and-hold engaged: turn the finger into a crosshair\n  if(!touch||!GEO)return; touchXhair=true; cv.style.touchAction='none';   // capture every direction so you can scrub freely\n  try{navigator.vibrate&&navigator.vibrate(12);}catch(e){}               // tiny haptic hint (ignored where unsupported)\n  const r=cv.getBoundingClientRect(); renderXhair(clientX-r.left,clientY-r.top,true,r.width); }\nfunction exitXhairGesture(){ touchXhair=false; cv.style.touchAction=''; }  // lift finger: keep the crosshair on screen so it stays readable\ncv.addEventListener('touchstart',e=>{ if(!BARS.length)return; clearLP(); clearXhair(); tip.style.opacity=0; touchXhair=false;\n  if(e.touches.length===1){ const t0=e.touches[0];\n    touch={mode:'pan',x:t0.clientX,y:t0.clientY,start:S.start,decided:false,horiz:false};\n    lpTimer=setTimeout(()=>{ if(touch&&touch.mode==='pan'&&!touch.decided) enterXhair(touch.x,touch.y); },320);   // hold still ~0.3s -> crosshair\n  } else if(e.touches.length>=2){ touch={mode:'zoom',d0:Math.max(1,tdist(e.touches)),span0:S.span,right:S.start+S.span}; }\n},{passive:true});\ncv.addEventListener('touchmove',e=>{ if(!touch||!BARS.length)return;\n  if(touchXhair&&e.touches.length===1){ e.preventDefault();       // in crosshair mode: scrub, don't pan\n    const r=cv.getBoundingClientRect(); renderXhair(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top,true,r.width); return; }\n  if(touch.mode==='pan'&&e.touches.length===1){\n    const dx=e.touches[0].clientX-touch.x, dy=e.touches[0].clientY-touch.y;\n    if(!touch.decided){ if(Math.abs(dx)<6&&Math.abs(dy)<6)return; touch.decided=true; touch.horiz=Math.abs(dx)>=Math.abs(dy); clearLP(); }  // movement cancels the hold\n    if(!touch.horiz)return;\n    e.preventDefault();\n    const plotW=cv.clientWidth-8-58, perBar=plotW/Math.max(1,S.span-1);\n    S.start=clampStart(touch.start-Math.round(dx/perBar)); tip.style.opacity=0; draw();\n  } else if(touch.mode==='zoom'&&e.touches.length>=2){ clearLP();\n    e.preventDefault(); const d=Math.max(1,tdist(e.touches));\n    let span=Math.round(touch.span0*(touch.d0/d)); span=Math.max(12,Math.min(BARS.length,span));\n    S.span=span; S.start=clampStart(touch.right-span); draw();\n  }\n},{passive:false});\ncv.addEventListener('touchend',e=>{ clearLP(); if(e.touches.length===0){ touch=null; if(touchXhair)exitXhairGesture(); } },{passive:true});\n\ncv.addEventListener('mousemove',ev=>{if(!GEO)return;const r=cv.getBoundingClientRect(),mx=ev.clientX-r.left,my=ev.clientY-r.top;\n  if(drag){clearXhair();tip.style.opacity=0;const plotW=cv.clientWidth-8-58, perBar=plotW/Math.max(1,(S.span-1)), dxBars=Math.round((ev.clientX-drag.x)/perBar);\n    S.start=clampStart(drag.start-dxBars);draw();return;}\n  renderXhair(mx,my,false,r.width);});\ncv.addEventListener('mouseleave',()=>{tip.style.opacity=0;clearXhair();});\n\n/* controls */\nfunction segWire(id,fn){document.querySelectorAll(`#${id} button`).forEach(b=>{b.onclick=()=>{\n  document.querySelectorAll(`#${id} button`).forEach(x=>x.classList.remove('on'));b.classList.add('on');fn(b);};});}\nsegWire('segData',b=>{const d=b.dataset.d;$('#pasteBox').classList.toggle('show',d==='PASTE');\n  if(d==='NVDA'){S.src='NVDA';S.ticker=PAM_DATA.ticker;recompute();}});\nsegWire('segTf',b=>{S.tf=b.dataset.tf;recompute();if(SCAN.full)scanSetTf(S.tf,false);});\nsegWire('segLens',b=>{S.lens=+b.dataset.l;draw();});\ndocument.querySelectorAll('#layers button').forEach(b=>{b.onclick=()=>{\n  b.classList.toggle('on'); S.layers[b.dataset.ly]=b.classList.contains('on'); draw();};});\nsegWire('segRecent',b=>{S.recentOnly=(+b.dataset.r===1);draw();});\ndocument.querySelectorAll('#indicators button').forEach(b=>{b.onclick=()=>{\n  b.classList.toggle('on'); S.ind[b.dataset.in]=b.classList.contains('on'); draw();};});\n\nfunction parsePaste(txt){\n  const rows=txt.trim().split(/\\r?\\n/).filter(r=>r.trim());const o=[],h=[],l=[],c=[],t=[],v=[];\n  rows.forEach((r,i)=>{const p=r.split(/[\\s,;\\t]+/).filter(Boolean);let nums,date=String(i+1);\n    if(/[-\\/]/.test(p[0])){date=p[0];nums=p.slice(1).map(Number);}else nums=p.map(Number);\n    if(nums.length<4||nums.slice(0,4).some(isNaN))throw new Error(`Row ${i+1}: need 4 numbers (O H L C).`);\n    o.push(nums[0]);h.push(nums[1]);l.push(nums[2]);c.push(nums[3]);v.push(nums[4]||0);t.push(date);});\n  if(c.length<55)throw new Error(`Got ${c.length} bars — need ≥55 for the 50 SMA. Paste more history.`);\n  return{open:o,high:h,low:l,close:c,time:t,volume:v};\n}\n$('#pasteRun').onclick=()=>{try{S.paste=parsePaste($('#pasteTa').value);S.src='PASTE';S.ticker='PASTED';\n  if(S.tf==='W'){S.tf='1';document.querySelectorAll('#segTf button').forEach(x=>x.classList.toggle('on',x.dataset.tf==='1'));}\n  $('#pasteErr').textContent='';S.name='';recompute();buildEff();renderEffectiveness();}catch(e){$('#pasteErr').textContent=e.message;}};\n$('#pasteSample').onclick=()=>{const a=[];let p=100;\n  for(let i=0;i<80;i++){p+= i<60?0.9+Math.sin(i/5):(i<70?1.6:-1.4);\n    const o=p,c=p+(Math.random()-0.45)*1.6,hi=Math.max(o,c)+Math.random()*1.3,loo=Math.min(o,c)-Math.random()*1.3;\n    a.push([o.toFixed(2),hi.toFixed(2),loo.toFixed(2),c.toFixed(2)].join(','));p=c;}\n  $('#pasteTa').value=a.join('\\n');};\n\n/* ---- live fetch: type a symbol -> Twelve Data (CORS-enabled) -> OHLC bars ---- */\nfunction setStatus(msg,kind){const el=$('#fetchStatus');el.textContent=msg;\n  el.style.color = kind==='err'?'var(--short)':kind==='ok'?'var(--long)':'var(--mut)';}\nfunction tdSeries(j){ // Twelve Data time_series -> {time,open,high,low,close,volume} ascending\n  const v=(j.values||[]).slice().reverse();\n  return {time:v.map(r=>String(r.datetime).slice(0,10)),\n    open:v.map(r=>+r.open),high:v.map(r=>+r.high),low:v.map(r=>+r.low),\n    close:v.map(r=>+r.close),volume:v.map(r=>+(r.volume||0))};\n}\nasync function tdFetch(symbol,interval,size,key){\n  const url=\"https://api.twelvedata.com/time_series?symbol=\"+encodeURIComponent(symbol)+\n    \"&interval=\"+interval+\"&outputsize=\"+size+\"&format=JSON&apikey=\"+encodeURIComponent(key);\n  const r=await fetch(url); const j=awa ker;\n    sym.style.cssText='font-family:var(--mono);font-size:12px;font-weight:600;color:var(--long);background:none;border:none;cursor:pointer;padding:0;flex:none';\n    sym.onclick=()=>{$('#tkInput').value=e.ticker;fetchSymbol(e.ticker);};\n    const who=document.createElement('span');who.textContent=e.name||'\\u2014';   /* textContent -> safe */\n    who.style.cssText='font-size:11.5px;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap';\n    left.appendChild(sym);left.appendChild(who);\n    const dt=document.createElement('div');\n    dt.textContent=new Date(e.t).toLocaleString();\n    dt.style.cssText='font-family:var(--mono);font-size:10.5px;color:var(--faint);flex:none';\n    row.appendChild(left);row.appendChild(dt);\n    c.appendChild(row);\n  });\n}\nfunction renderPresence(active,you){\n  const el=$('#groupPresence');if(!el)return;\n  active=Array.isArray(active)?active:[];\n  const names=active.map(n=>n===you?'you':n);          /* label yourself */\n  let label;\n  if(!active.length){label='nobody active right now';}\n  else{const shown=names.slice(0,4);label=active.length+' active in 10 min \\u00b7 '+shown.join(', ')+(names.length>4?' +'+(names.length-4)+' more':'');}\n  el.innerHTML='';\n  const d=document.createElement('span');\n  d.style.cssText='display:inline-block;width:7px;height:7px;border-radius:50%;background:'+(active.length?'var(--long)':'var(--faint)')+';margin-right:6px;vertical-align:middle';\n  const t=document.createElement('span');\n  t.textContent=label;                                  /* textContent -> names can't inject HTML */\n  t.style.cssText='font-family:var(--mono);font-size:11px;color:var(--mut);vertical-align:middle';\n  el.appendChild(d);el.appendChild(t);\n}\nasync function groupPull(){\n  if(!GROUP.token)return;\n  try{const j=await groupPost('list');renderGroupFeed(j.log);renderPresence(j.active,j.you);groupStatus('In group as '+j.you+' \\u00b7 '+new Date().toLocaleTimeString(),'ok');}\n  catch(err){groupStatus(err.message==='not_a_member'?'Token not recognised \\u2014 ask the owner to add you':'Group: '+err.message,'err');}\n}\nasync function groupLog(sym){\n  if(!GROUP.token)return;                       /* not in a group -> stays local-only */\n  try{const j=await groupPost('log',{ticker:sym});renderGroupFeed(j.log);renderPresence(j.active,j.you);}\n  catch(err){groupStatus('Group: '+err.message,'err');}\n}\nfunction groupJoin(){\n  GROUP.token=($('#grpToken').value||'').trim();\n  LS.set('pam_grp_token',GROUP.token);\n  if(!GROUP.token){groupStatus('Paste your token, then Join','err');renderGroupFeed([]);return;}\n  groupStatus('Checking\\u2026');groupPull();\n}\nfunction groupInit(){\n  GROUP.token=LS.get('pam_grp_token')||'';\n  const ti=$('#grpToken');if(ti)ti.value=GROUP.token;\n  const jb=$('#grpJoin');if(jb)jb.onclick=groupJoin;\n  const rb=$('#grpRefresh');if(rb)rb.onclick=groupPull;\n  const rb2=$('#grpRefresh2');if(rb2)rb2.onclick=groupPull;\n  const tg=$('#grpToggle');if(tg)tg.onclick=()=>{const p=$('#groupPanel');p.style.display=p.style.display==='none'?'block':'none';};\n  if(GROUP.token){groupPull();}\n  clearInterval(GROUP.timer);\n  GROUP.timer=setInterval(()=>{if(GROUP.token&&!document.hidden)groupPull();},45000);  /* auto-refresh the feed */\n}\n/* ---- Scan by trigger — reads scan_results.json (the whole-market precompute) ---- */\nconst SCAN = { data:null, sel:null, meta:{}, filt:{ capMin:null, capMax:null, pxMin:null, pxMax:null, ind:'', units:[] }, sort:{ by:'fresh', dir:1 } };\nconst PXSLIDER = { min:0, max:100, lo:0, hi:100 };\nconst TURTLE_TRIGS = ['S1','S2','S1s','S2s'];\nconst DEFAULT_SCAN_URL = 'https://raw.githubusercontent.com/normacky/pam_analyzer/main/scan_results.json';\nconst TRIG_DIR = {'Bull-FS':'long','UC1':'long','UC2':'long','DR1':'long','DR2':'long','S1':'long','S2':'long',\n  'Bear-FS':'short','DC1':'short','DC2':'short','UR1':'short','UR2':'short','S1s':'short','S2s':'short'};\nfunction scanRenderChips(){\n  const c=$('#scanChips'); if(!c)return; c.innerHTML='';\n  const d=SCAN.data;\n  if(!d){ c.innerHTML='<span style=\"font-family:var(--mono);font-size:11px;color:var(--faint)\">load a scan_results.json (paste its URL, or use \\u201cLoad file\\u2026\\u201d) to begin<\u002Fspan>'; return; }\n  if(d._missingTf){ c.innerHTML='<span style=\"font-family:var(--mono);font-size:11px;color:var(--faint)\">no '+scanTfLabel(d._missingTf).toLowerCase()+' data in this scan \\u2014 re-run the scanner (updated pam_scan.js) to include 2-day &amp; weekly<\u002Fspan>'; return; }\n  const counts=d.counts||{};\n  const order=(d.trigger_types||Object.keys(counts)).filter(t=>counts[t]>0);\n  if(!order.length){ c.innerHTML='<span style=\"font-family:var(--mono);font-size:11px;color:var(--faint)\">no triggers fired in this scan window<\u002Fspan>'; return; }\n  order.forEach(t=>{\n    const b=document.createElement('button');\n    b.className='chip scanchip '+(TRIG_DIR[t]||'')+(SCAN.sel===t?' sel':'');\n    b.innerHTML=t+' <span class=\"n\">'+counts[t]+'<\u002Fspan>';\n    b.onclick=()=>{ const picked=(SCAN.sel!==t); SCAN.sel=picked?t:null; scanRenderChips(); scanRenderList(); if(picked) scanSecSet('trigger', false); };\n    c.appendChild(b);\n  });\n}\nfunction scanRowPasses(r){\n  const f=SCAN.filt, m=SCAN.meta[r.t]||{};\n  if(f.capMin!=null||f.capMax!=null){ const b=(m.mc!=null)?m.mc/1e9:null; if(b==null)return false; if(f.capMin!=null&&b<f.capMin)return false; if(f.capMax!=null&&b>f.capMax)return false; }\n  if(f.pxMin!=null||f.pxMax!=null){ const p=(m.px!=null)?+m.px:null; if(p==null)return false; if(f.pxMin!=null&&p<f.pxMin)return false; if(f.pxMax!=null&&p>f.pxMax)return false; }\n  if(f.ind && (m.industry||'')!==f.ind) return false;\n  if(f.units && f.units.length && r.unit!=null && f.units.indexOf(r.unit)<0) return false;\n  return true;\n}\nfunction scanRenderList(){\n  const body=$('#scanBody'); if(!body)return; body.innerHTML='';\n  const d=SCAN.data;\n  const ur=$('#scanUnits');\n  if(ur)ur.style.display=(d&&SCAN.sel&&TURTLE_TRIGS.indexOf(SCAN.sel)>=0&&(d.rows||[]).some(r=>r.unit!=null))?'flex':'none';\n  if(!d||!SCAN.sel)return;\n  const all=(d.rows||[]).filter(r=>r.trig===SCAN.sel);\n  const rows=all.filter(scanRowPasses).sort(scanCmp);\n\n  const head=document.createElement('div'); head.className='sccount';\n  head.textContent=(rows.length===all.length)\n    ? all.length+' counter'+(all.length===1?'':'s')+' fired '+SCAN.sel+' \\u2014 tap any to chart'\n    : rows.length+' of '+all.length+' '+SCAN.sel+' counters match \\u2014 tap any to chart';\n  body.appendChild(head);\n  if(typeof scanSecSummaries==='function')scanSecSummaries();\n  if(!rows.length){ const e=document.createElement('div'); e.style.cssText='font-family:var(--mono);font-size:11px;color:var(--faint);padding:6px 8px'; e.textContent=all.length?'none match the current filters':'no counters'; body.appendChild(e); return; }\n\n  const metas=rows.map(r=>SCAN.meta[r.t]||{});\n  const hasPx=metas.some(m=>m.px!=null), hasCap=metas.some(m=>m.mc!=null), hasInd=metas.some(m=>m.industry);\n  const hasUnit=(TURTLE_TRIGS.indexOf(SCAN.sel)>=0) && rows.some(r=>r.unit!=null);\n\n  const cols=[{k:'fresh',by:'fresh'},{k:'ticker',lbl:'Ticker',by:'ticker'}];\n  const tmpl=['22px','minmax(0,1.35fr)'];\n  if(hasUnit){ cols.push({k:'unit',lbl:'Unit',by:'unit',right:true}); tmpl.push('46px'); }\n  if(hasPx){ cols.push({k:'px',lbl:'Price',by:'px',right:true}); tmpl.push('66px'); }\n  if(hasCap){ cols.push({k:'cap',lbl:'Mkt cap',by:'cap',right:true}); tmpl.push('62px'); }\n  if(hasInd){ cols.push({k:'ind',lbl:'Industry',by:'industry'}); tmpl.push('minmax(0,1fr)'); }\n  const gt=tmpl.join(' ');\n\n  const hr=document.createElement('div'); hr.className='sctab-head'; hr.style.gridTemplateColumns=gt;\n  cols.forEach(col=>{\n    const active=SCAN.sort.by===col.by, arr=SCAN.sort.dir>0?'\\u2191':'\\u2193';\n    const c=document.createElement('div'); c.className='scth'+(col.right?' r':'')+(active?' on':'');\n    if(col.k==='fresh'){ c.title='Sort by recency'; c.style.justifyContent='center'; c.innerHTML='<span style=\"font-size:11px\">\\u21BB<\u002Fspan>'+(active?'<span class=\"ar\">'+arr+'<\u002Fspan>':''); }\n    else { c.innerHTML=col.lbl+' <span class=\"ar'+(active?'':' off')+'\">'+(active?arr:'\\u2195')+'<\u002Fspan>'; }\n    c.onclick=()=>scanSetSort(col.by);\n    hr.appendChild(c);\n  });\n  body.appendChild(hr);\n\n  rows.forEach(r=>{\n    const m=SCAN.meta[r.t]||{};\n    const row=document.createElement('div'); row.className='sctr'; row.style.gridTemplateColumns=gt; row.title='Load '+r.t;\n    row.onclick=()=>{ if(window.pamExpandChart)window.pamExpandChart(); $('#tkInput').value=r.t; fetchSymbol(r.t); };\n    const fresh=r.ago===0, warn=(r.unit>1||r.smelly);\n    const dot=document.createElement('span'); dot.className='scdot'; dot.style.background='var(--'+(warn?'force':fresh?'long':'faint')+')';\n    const ageTxt=r.ago===0?'latest bar':(r.ago+' bar'+(r.ago===1?'':'s')+' back');\n    const extra=[]; if(r.sys)extra.push(r.sys===2?'55-day':'20-day'); if(r.unit>1)extra.push('+'+r.unit+' add'); else if(r.smelly)extra.push('past entry');\n    dot.title=ageTxt+(extra.length?' \\u00b7 '+extra.join(' \\u00b7 '):'');\n    row.appendChild(dot);\n    const tk=document.createElement('div'); tk.className='sccell-tk';\n    const s=document.createElement('div'); s.className='s'; s.textContent=r.t; s.style.color='var(--'+(r.dir==='long'?'long':'short')+')';\n    tk.appendChild(s);\n    if(m.name){ const n=document.createElement('div'); n.className='n'; n.textContent=m.name; n.title=m.name; tk.appendChild(n); }\n    row.appendChild(tk);\n    if(hasUnit){ const uc=document.createElement('div'); uc.className='sccell-unit'; const u=r.unit; uc.textContent=(u!=null)?(u+(['th','st','nd','rd'][(u%10<4&&!(u%100>10&&u%100<14))?u%10:0])):'–'; if(u!=null&&u>1)uc.style.color='var(--force)'; uc.title=(u!=null)?('unit '+u+' of the pyramid'):''; row.appendChild(uc); }\n    if(hasPx){ const px=document.createElement('div'); px.className='sccell-px'; px.textContent=(m.px!=null)?('$'+(+m.px).toFixed(2)):'\\u2013'; row.appendChild(px); }\n    if(hasCap){ const cap=document.createElement('div'); cap.className='sccell-cap'; cap.textContent=(m.mc!=null)?scanFmtCapShort(m.mc):'\\u2013'; row.appendChild(cap); }\n    if(hasInd){ const ind=document.createElement('div'); ind.className='sccell-ind'; ind.textContent=m.industry||'\\u2013'; ind.title=m.industry||''; row.appendChild(ind); }\n    // options enrichment: if this ticker has a spread block, add a toggle + collapsible detail. Row-tap still charts.\n    const _o=scanOptFor(r.t);\n    if(_o&&_o.has_options){\n      const tg=document.createElement('button'); tg.type='button'; tg.className='optbadge';\n      // green \"ready\" badge when either of this direction's two spreads meets ALL its criteria — quick eyeball for a clean setup\n      const _pair=(r.dir==='long')?['bps','bull_call']:['bcs','bear_put'];\n      const _sps=_o.spreads||{};\n      const _ready=_pair.filter(k=>optSpreadAllMet(k,_sps[k],_o));\n      if(_ready.length) tg.classList.add('ready');\n      tg.textContent='options \\u203a';\n      tg.title=_ready.length?(_ready.map(k=>OPT_NAME[k]).join(' & ')+' meets all criteria \\u2014 tap for detail'):'Show vertical-spread candidates for '+r.t;\n      tg.onclick=(e)=>{ e.stopPropagation(); optDrawerOpen(r.t, r.dir); };\n      tk.appendChild(tg);\n    }\n    body.appendChild(row);\n  });\n}\n/* ---- options enrichment display — reads the opt block written by pam_scan.js ---- */\nfunction scanOptBlock(){ return (SCAN.full&&SCAN.full.opt)||null; }\nfunction scanOptFor(t){ const b=scanOptBlock(); return (b&&b.symbols&&b.symbols[t])||null; }\nconst OPT_NAME={bps:'Bull Put Spread',bcs:'Bear Call Spread',bull_call:'Bull Call Spread',bear_put:'Bear Put Spread'};\n/* ===== options detail drawer (scan rows → side drawer / bottom sheet) ===== */\nfunction optDrawerOpen(t, dir){\n  const dw=$('#optDrawer'); if(!dw)return;\n  const o=scanOptFor(t); if(!o||!o.has_options)return;\n  const m=(SCAN.meta&&SCAN.meta[t])||{};\n  const tkEl=$('#optDrawerTk'); if(tkEl){ tkEl.textContent=t; tkEl.style.color='var(--'+(dir==='long'?'long':'short')+')'; }\n  const nmEl=$('#optDrawerNm'); if(nmEl)nmEl.textContent=[m.name,m.industry].filter(Boolean).join(' · ');\n  const b=$('#optDrawerBody'); if(b){ b.innerHTML=''; b.appendChild(optDetailCard(t,dir)); b.scrollTop=0; }\n  dw.classList.add('open'); dw.setAttribute('aria-hidden','false');\n}\nfunction optDrawerClose(){ const dw=$('#optDrawer'); if(dw){ dw.classList.remove('open'); dw.setAttribute('aria-hidden','true'); } }\n(function(){\n  const dw=$('#optDrawer'); if(!dw)return;\n  const sc=$('#optDrawerScrim'), x=$('#optDrawerClose');\n  if(sc)sc.onclick=optDrawerClose;\n  if(x)x.onclick=optDrawerClose;\n  document.addEventListener('keydown',e=>{ if(e.key==='Escape')optDrawerClose(); });\n})();\nconst ADX_RANGE_MAX=20;   // Iron Condor shows only when Wilder ADX is below this (rangebound). Raise/lower to taste — no rescan needed.\nfunction optPill(label,state){\n  const p=document.createElement('span');\n  p.className='pill '+(state===true?'ok':state===false?'no':'info');\n  p.textContent=label+' '+(state===true?'\\u2713':state===false?'\\u2717':'\\u00b7');\n  return p;\n}\nfunction optMoney(x){ return x==null?'\\u2013':'$'+(+x).toFixed(2); }\n// scan window as text: multi-expiry scans (v0.18 scanner) show \"30\\u201345 DTE window\"; old single-expiry files fall back to \"37-DTE chain\"\nfunction optWinTxt(o){ return (o&&o.expiries&&o.expiries.length>1)?(o.expiries[0][1]+'\\u2013'+o.expiries[o.expiries.length-1][1]+' DTE window'):((o?o.dte:'?')+'-DTE chain'); }\n// earnings-inside for THIS spread's own expiry (v0.18 scanner writes it per spread); old files fall back to the symbol-level flag\nfunction optEarnIn(sp,o){ return (sp&&sp.earnings_inside!==undefined)?sp.earnings_inside:((o&&o.flags)?o.flags.earnings_inside:null); }\n// true only if EVERY hard criterion on this spread is met (green). Unknown/missing => not met.\n// Deploy-context pills (market regime / stock trend / $20bn cap) are informational and NOT part of this badge.\nfunction optSpreadAllMet(kind,sp,o){\n  if(!sp||!sp.ok||!o||!o.flags) return false;\n  const credit=(kind==='bps'||kind==='bcs');\n  return credit\n    ? (o.flags.iv_high===true && optEarnIn(sp,o)===false && sp.ok.liquidity===true && sp.ok.credit_4x===true)\n    : (o.flags.iv_low===true  && sp.ok.liquidity===true && sp.ok.rr_1to2===true);\n}\nfunction optSpreadCard(kind,sp,o,favoured,alignedLong){\n  const card=document.createElement('div'); card.className='optspread'+(favoured?' fav':'');\n  const credit=(kind==='bps'||kind==='bcs');\n  const head=document.createElement('div'); head.className='osh';\n  const nm=document.createElement('span'); nm.className='osname'; nm.textContent=OPT_NAME[kind];\n  const tp=document.createElement('span'); tp.className='ostag '+(credit?'cr':'db'); tp.textContent=credit?'credit':'debit';\n  head.appendChild(nm); head.appendChild(tp);\n  if(favoured){ const f=document.createElement('span'); f.className='ostag fav'; f.textContent='IV-favoured'; head.appendChild(f); }\n  card.appendChild(head);\n  if(!sp){ const e=document.createElement('div'); e.className='osnone'; e.textContent='no valid strikes in any expiry of the '+optWinTxt(o)+' (thin or wide market)'; card.appendChild(e); return card; }\n  const legs=document.createElement('div'); legs.className='oslegs';\n  legs.textContent = kind==='bps' ? 'Sell '+sp.short_k+'P  /  Buy '+sp.long_k+'P'\n                   : kind==='bcs' ? 'Sell '+sp.short_k+'C  /  Buy '+sp.long_k+'C'\n                   : kind==='bull_call' ? 'Buy '+sp.long_k+'C  /  Sell '+sp.short_k+'C'\n                   : 'Buy '+sp.long_k+'P  /  Sell '+sp.short_k+'P';\n  if(sp.expiry) legs.textContent+='   \\u00b7   exp '+sp.expiry+' ('+sp.dte+'d)';   // each spread carries the expiry it was best on\n  card.appendChild(legs);\n  const eco=document.createElement('div'); eco.className='oseco';\n  eco.textContent = credit\n    ? 'credit '+optMoney(sp.credit)+'  \\u00b7  width '+optMoney(sp.width)+'  \\u00b7  max loss '+optMoney(sp.max_loss)+'  \\u00b7  BE '+optMoney(sp.breakeven)\n    : 'debit '+optMoney(sp.debit)+'  \\u00b7  width '+optMoney(sp.width)+'  \\u00b7  max profit '+optMoney(sp.max_profit)+'  \\u00b7  BE '+optMoney(sp.breakeven);\n  card.appendChild(eco);\n  const fl=document.createElement('div'); fl.className='osflags';\n  if(credit){\n    fl.appendChild(optPill('IV>35%',o.flags.iv_high));\n    const ei=optEarnIn(sp,o);   // earnings vs THIS spread's expiry — a shorter expiry can legitimately dodge a late-window report\n    fl.appendChild(optPill(ei===false?'no earnings':ei===true?('earnings '+(o.flags.earnings_date||'')):'earnings ?', ei===false?true:ei===true?false:null));\n    fl.appendChild(optPill('liquid',sp.ok?sp.ok.liquidity:null));\n    fl.appendChild(optPill('max-loss \\u22644\\u00d7',sp.ok?sp.ok.credit_4x:null));\n    // \"When to Deploy\" context from Cards 19/20 — informational, not part of the green all-met badge\n    if(o.flags.mc_20b!=null) fl.appendChild(optPill('cap \\u2265$20bn',o.flags.mc_20b));\n    const wantBear=(kind==='bcs');\n    if(o.flags.spy_bear!=null) fl.appendChild(optPill(wantBear?'SPY bear':'SPY bull', o.flags.spy_bear===wantBear));\n    if(o.flags.stock_trend_up!=null) fl.appendChild(optPill(wantBear?'stock downtrend':'stock uptrend', o.flags.stock_trend_up===!wantBear));\n  } else {\n    fl.appendChild(optPill('IV<30%',o.flags.iv_low));\n    fl.appendChild(optPill('liquid',sp.ok?sp.ok.liquidity:null));\n    fl.appendChild(optPill('R:R \\u22651:2',sp.ok?sp.ok.rr_1to2:null));\n  }\n  card.appendChild(fl);\n  return card;\n}\n\n// Iron Condor (Card 8): neutral, four legs = a Bull Put Spread + a Bear Call Spread sold together.\n// Same DOM/classes as optSpreadCard so it inherits the existing card styling. Always rendered (shows an\n// empty-state note when
